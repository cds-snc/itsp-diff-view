<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ITSG-33 to ITSP.10.033 Control Diff</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>ITSP.10.033 Control Diff</h1>
        <p>Search and review changes in the March 2026 Cyber Centre control catalogue.</p>
      </div>
      <a id="sourceLink" href="https://www.cyber.gc.ca/en/guidance/cyber-security-privacy-risk-management/itsp10033">Source</a>
    </header>

    <main>
      <section class="stats" id="stats"></section>

      <section class="toolbar" aria-label="Filters">
        <input id="search" type="search" placeholder="Search ID, title, text, or related controls">
        <select id="family"></select>
        <select id="status">
          <option value="">All changes</option>
          <option value="added">Added</option>
          <option value="changed">Changed</option>
          <option value="removed">Removed</option>
          <option value="withdrawn">Withdrawn</option>
          <option value="unchanged">Unchanged</option>
        </select>
        <select id="type">
          <option value="">All types</option>
          <option value="control">Controls</option>
          <option value="activity">Activities</option>
          <option value="enhancement">Enhancements</option>
        </select>
        <select id="scope">
          <option value="">All scopes</option>
          <option value="system">System</option>
          <option value="organization">Organization</option>
          <option value="both">Both</option>
          <option value="needs_review">Needs review</option>
        </select>
        <output id="resultCount" class="result-count" aria-live="polite"></output>
      </section>

      <section class="layout">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Family</th>
                <th>Title</th>
                <th>Status</th>
                <th>Type</th>
                <th>Scope</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
        <aside id="detail" class="detail">
          <p class="empty">Select a row to inspect the old and new text.</p>
        </aside>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
