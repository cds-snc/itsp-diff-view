    title: "Literacy training and awareness: Advanced persistent threat"
    text: |-
      Provide literacy training on the advanced persistent threat.
      Discussion: An effective way to detect APT s and to preclude successful attacks is to provide specific literacy training for individuals. Threat literacy training includes educating individuals on the various ways that APT s can infiltrate the organization (e.g., through websites, emails, advertisement pop-ups, articles, and social engineering). Effective training includes techniques for recognizing suspicious emails, use of removable systems in non-secure settings, and the potential targeting of individuals at home.
      Related controls and activities: None.
