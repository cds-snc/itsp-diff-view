  - canonicalId: "IR-08"
    displayId: "IR-08"
    sourceId: "IR-08"
    family: "IR"
    type: "activity"
    title: "Incident response plan"
    text: |-
      Develop an incident response plan that
      provides the organization with a roadmap for implementing its incident response capability
      describes the structure and organization of the incident response capability
      provides a high-level approach for how the incident response capability fits into the overall organization
      meets the unique requirements of the organization which relate to mission, size, structure, and functions
      defines reportable incidents
      provides metrics for measuring the incident response capability within the organization
      defines the resources and management support needed to effectively maintain and mature an incident response capability
      addresses the sharing of incident information
      is reviewed and approved by [Assignment: organization-defined personnel or roles] [Assignment: organization-defined frequency]
      explicitly designates responsibility for incident response to [Assignment: organization-defined entities, personnel, or roles]
      Distribute copies of the incident response plan to [Assignment: organization-defined incident response personnel (identified by name and/or by role) and organizational elements]
      Update the incident response plan to address system and organizational changes or problems encountered during plan implementation, execution, or testing
      Communicate incident response plan changes to [Assignment: organization-defined incident response personnel (identified by name and/or by role) and organizational elements]
      Protect the incident response plan from unauthorized disclosure and modification
    discussion: |-
      It is important that organizations develop and implement a coordinated approach to incident response. Organizational mission and business functions determine the structure of incident response capabilities. As part of the incident response capabilities, organizations consider the coordination and sharing of information with external organizations, including external service providers and other organizations involved in the supply chain. For incidents involving personal information (i.e., privacy breaches), include a process to determine whether notice to oversight organizations or affected individuals is appropriate and provide that notice accordingly.
