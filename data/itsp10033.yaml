  - canonicalId: "SI-22"
    displayId: "SI-22"
    sourceId: "SI-22"
    family: "SI"
    type: "control"
    title: "Information diversity"
    text: |-
      Identify the following alternative sources of information for [Assignment: organization-defined essential functions and services]: [Assignment: organization-defined alternative information sources]
      Use an alternative information source for the execution of essential functions or services on [Assignment: organization-defined systems or system components] when the primary source of information is corrupted or unavailable
    discussion: |-
      Actions taken by a system service or a function are often driven by the information it receives. Corruption, fabrication, modification, or deletion of that information could impact the ability of the service function to properly carry out its intended actions. By having multiple sources of input, the service or function can continue operation if one source is corrupted or no longer available. It is possible that the alternative sources of information may be less precise or less accurate than the primary source of information. But having such sub-optimal information sources may still provide a sufficient level of quality that the essential service or function can be carried out, even in a degraded or debilitated manner.
    sourceUrl: |-
      https://www.cyber.gc.ca/en/guidance/cyber-security-privacy-risk-management/itsp10033/system-information-integrity#3.19-SI-22
  - canonicalId: "SI-23"
    displayId: "SI-23"
    sourceId: "SI-23"
    family: "SI"
    type: "control"
    title: "Information fragmentation"
    text: |-
      Based on [Assignment: organization-defined circumstances]:
      fragment the following information: [Assignment: organization-defined information]
      distribute the fragmented information across the following systems or system components: [Assignment: organization-defined systems or system components]
    discussion: |-
      One objective of the advanced persistent threat is to exfiltrate valuable information. Once exfiltrated, there is generally no way for the organization to recover the lost information. Therefore, organizations may consider dividing the information into disparate elements and distributing those elements across multiple systems or system components and locations. Such actions will increase the adversary’s work factor to capture and exfiltrate the desired information and, in so doing, increase the probability of detection. The fragmentation of information impacts the organization’s ability to access the information in a timely manner. The extent of the fragmentation is dictated by the impact or classification level (and value) of the information, threat intelligence information received, and whether data tainting is used (i.e., data tainting-derived information about the exfiltration of some information could result in the fragmentation of the remaining information).
    sourceUrl: |-
      https://www.cyber.gc.ca/en/guidance/cyber-security-privacy-risk-management/itsp10033/system-information-integrity#3.19-SI-23
  - canonicalId: "SR-01"
    displayId: "SR-01"
    sourceId: "SR-01"
    family: "SR"
    type: "activity"
    title: "Supply chain risk management policy and procedures"
    text: |-
      Develop, document, and disseminate to [Assignment: organization-defined personnel or roles]
      [Selection (1 or more): Organization-level; Mission/business process-level; System-level] supply chain risk management (SCRM) policy that
      addresses purpose, scope, roles, responsibilities, management commitment, coordination among organizational entities, and compliance
      is consistent with applicable laws, Orders in Council, directives, regulations, policies, standards, and guidelines
      procedures to facilitate the implementation of the SCRM policy and the associated SCRM controls
      Designate an [Assignment: organization-defined official] to manage the development, documentation, and dissemination of the SCRM policy and procedures
      Review and update the current SCRM 
      policy [Assignment: organization-defined frequency] and following [Assignment: organization-defined events]
      procedures [Assignment: organization-defined frequency] and following [Assignment: organization-defined events]
    discussion: |-
      SCRM policy and procedures address the controls in the SR family, as well as supply chain-related controls in other families, that are implemented within systems and organizations. The risk management strategy is an important factor in establishing such policies and procedures. Policies and procedures contribute to security and privacy assurance. Therefore, it is important that security and privacy programs collaborate on the development of SCRM policy and procedures.
      In general, security and privacy program policies and procedures at the organization level are preferable and may remove the need for mission- or system-specific policies and procedures. The policy can be included as part of the general security and privacy policy or be represented by multiple policies that reflect the complex nature of organizations.
      Procedures can be established for security and privacy programs, for mission or business processes, and for systems, if needed. Procedures describe how the policies or controls are implemented and can be directed at the individual or role that is the object of the procedure. Procedures can be documented in system security and privacy plans or in one or more separate documents.
      Events that may precipitate an update to SCRM policy and procedures include assessment or audit findings, security incidents or breaches, or changes in applicable laws, Orders in Council, directives, regulations, policies, standards, and guidelines. Simply restating controls does not constitute an organizational policy or procedure.
