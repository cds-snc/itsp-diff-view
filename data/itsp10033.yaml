  - canonicalId: "SC-30.03"
    displayId: "SC-30 (03)"
    sourceId: "SC-30 (03)"
    family: "SC"
    type: "enhancement"
    title: "Concealment and misdirection: Change processing and storage locations"
    text: |-
      Change the location of [Assignment: organization-defined processing and/or storage] [Selection (1): [Assignment: organization-defined time frequency]; at random time intervals]].
      Discussion: Adversaries target critical mission and business functions and the systems that support those mission and business functions while also trying to minimize the exposure of their existence and tradecraft. The static, homogeneous, and deterministic nature of organizational systems targeted by adversaries make such systems more susceptible to attacks with less adversary cost and effort to be successful.
      Changing processing and storage locations (also referred to as moving target defence) addresses the advanced persistent threat using techniques such as virtualization, distributed processing, and replication. This enables organizations to relocate the system components (i.e., processing, storage) that support critical mission and business functions.
      Changing the locations of processing activities and/or storage sites introduces a degree of uncertainty into the targeting activities of adversaries. The targeting uncertainty increases the work factor of adversaries and makes compromises or breaches of the organizational systems more difficult and time-consuming. It also increases the chances that adversaries may inadvertently disclose certain aspects of their tradecraft while attempting to locate critical organizational resources.
      Related controls and activities: None.
    discussion: |-
      Adversaries target critical mission and business functions and the systems that support those mission and business functions while also trying to minimize the exposure of their existence and tradecraft. The static, homogeneous, and deterministic nature of organizational systems targeted by adversaries make such systems more susceptible to attacks with less adversary cost and effort to be successful.
