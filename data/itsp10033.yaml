      Review all PIB s that were designated as exempt banks under section 18 of the Privacy Act [Assignment: organization-defined frequency] to ensure they remain appropriate and necessary in accordance with law.
      Discussion: None.
      GC discussion: The Privacy Act includes provisions that allow federal departments and agencies to claim exemptions to TBS from certain requirements. A PIB qualifies for exemption when more than half of the information in each file contained in the bank qualifies for an exemption under section 21 or 22 of the Privacy Act . The described files consist predominantly of personal information that relates to international affairs, defence, and law enforcement and investigation. Exempt PIB s still require registration with TBS .
