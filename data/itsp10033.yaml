  - canonicalId: "SA-15.12"
    displayId: "SA-15 (12)"
    sourceId: "SA-15 (12)"
    family: "SA"
    type: "enhancement"
    title: "Development process, standards, and tools: Minimize personal information"
    text: |-
      Require the developer of the system or system component to minimize the use of personal information in development and test environments.
      Discussion: Organizations can minimize the risk to an individual’s privacy by using techniques such as de-identification or synthetic data. Limiting the use of personal information in development and test environments helps reduce the level of privacy risk created by a system.
      GC discussion: Development and test environments should not be conducted using identifiable personal information, except in exceptional circumstances. It is recommended that system testing be completed using dummy data, scrambled data, or personal information that is otherwise obfuscated. At times, system testing may be outsourced. Even with obfuscated personal information, it is recommended that contracting documents require the deletion of testing data by the third-party vendor when development or testing is complete, to protect against the possibility of re-identification and breach.
      Related controls and activities: PM-25, SA-03, SA-08.
    discussion: |-
      Organizations can minimize the risk to an individual’s privacy by using techniques such as de-identification or synthetic data. Limiting the use of personal information in development and test environments helps reduce the level of privacy risk created by a system.
