    title: "Acquisition process: Canadian Common Criteria Program - recognized protection profiles"
    text: |-
      Limit the use of commercially provided cyber security and cyber security-enabled IT products to those products that have been successfully evaluated against a Canadian Common Criteria Program ( CCCP ) recognized protection profile for a specific technology type, if such a profile exists
