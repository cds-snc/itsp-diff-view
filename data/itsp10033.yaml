    title: "Cryptographic protection"
    text: |-
      Determine the [Assignment: organization-defined cryptographic uses]
      Implement the following types of cryptography required for each specified cryptographic use: [Assignment: organization-defined types of cryptography for each specified cryptographic use]
    discussion: |-
      Cryptography can be employed to support a variety of security solutions, including the protection of classified information and protected information, the provision and implementation of digital signatures, and the enforcement of information separation when authorized individuals have the necessary clearances but lack the necessary formal access approvals.
      Cryptography can also be used to support random number and hash generation. Generally applicable cryptographic standards include FIPS -validated cryptography and Cyber Centre-approved cryptography. For example, organizations that need to protect classified information may specify the use of Cyber Centre-approved cryptography. Organizations that need to provision and implement digital signatures may specify the use of FIPS -validated cryptography. Cryptography is implemented in accordance with applicable laws, Orders in Council, directives, regulations, policies, standards, and guidelines.
