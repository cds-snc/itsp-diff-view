  - canonicalId: "SA-08.15"
    displayId: "SA-08 (15)"
    sourceId: "SA-08 (15)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Predicate permission"
    text: |-
      Implement the security design principle of predicate permission in [Assignment: organization-defined systems or system components].
      Discussion: The principle of predicate permission states that system designers consider requiring multiple authorized entities to provide consent before a highly critical operation or access to highly sensitive data, information, or resources is allowed to proceed.
      Saltzer (Saltzer and Schroeder, 1975) originally named predicate permission the separation of privilege. It is also equivalent to separation of duty. The division of privilege among multiple parties decreases the likelihood of abuse and provides the safeguard that no single accident, deception, or breach of trust is sufficient to enable an unrecoverable action that can lead to significantly damaging effects.
      The design options for such a mechanism may require simultaneous action (e.g., the firing of a nuclear weapon requires 2 different authorized individuals to give the correct command within a small time window) or a sequence of operations where each successive action is enabled by some prior action, but no single individual is able to enable more than one action.
      Related controls and activities: AC-05.
    discussion: |-
      The principle of predicate permission states that system designers consider requiring multiple authorized entities to provide consent before a highly critical operation or access to highly sensitive data, information, or resources is allowed to proceed.
