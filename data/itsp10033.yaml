      Organizations may be required by law, regulation, or policy to follow specific procedures relating to breaches, which include: notifying individuals, affected organizations, and oversight bodies; standards of harm; and mitigation or other specific requirements. Organizations subject to the PIPEDA are required to report breaches involving personal information posing a real risk of significant harm to the OPC . They also need to notify the individuals about the breaches and to keep records of the breaches.
