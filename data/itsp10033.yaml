  - canonicalId: "SC-40"
    displayId: "SC-40"
    sourceId: "SC-40"
    family: "SC"
    type: "control"
    title: "Wireless link protection"
    text: |-
      Protect external and internal [Assignment: organization-defined wireless links] from the following signal parameter attacks: [Assignment: organization-defined types of signal parameter attacks or references to sources for such attacks].
    discussion: |-
      Wireless link protection applies to internal and external wireless communication links that may be visible to individuals who are not authorized system users. Adversaries can exploit the signal parameters of wireless links if such links are not adequately protected. There are many ways to exploit the signal parameters of wireless links to gain intelligence, deny service, or spoof system users. Protection of wireless links reduces the impact of attacks that are unique to wireless systems. If organizations rely on commercial service providers for transmission services as commodity items rather than as fully dedicated services, it may not be possible to implement wireless link protections to the extent necessary to meet organizational security requirements.
    related:
      - "AC-18"
      - "SC-05"
    sourceUrl: |-
      https://www.cyber.gc.ca/en/guidance/cyber-security-privacy-risk-management/itsp10033/system-communications-protection#3.18-SC-40
  - canonicalId: "SC-40.01"
    displayId: "SC-40 (01)"
    sourceId: "SC-40 (01)"
    family: "SC"
    type: "enhancement"
    title: "Wireless link protection: Electromagnetic interference"
    text: |-
      Implement cryptographic mechanisms that achieve [Assignment: organization-defined level of protection] against the effects of intentional electromagnetic interference.
      Discussion: The implementation of cryptographic mechanisms that mitigate electromagnetic interference protects systems against intentional jamming that might deny or impair communications by ensuring that wireless spread- spectrum waveforms used to provide anti-jam protection are not predictable by unauthorized individuals. The implementation of cryptographic mechanisms may also coincidentally mitigate the effects of unintentional jamming due to interference from legitimate transmitters that share the same spectrum. Mission requirements, projected threats, concepts of operations, and laws, Orders in Council, directives, regulations, policies, and standards determine the levels of wireless link availability, cryptography needed, and performance.
      Related controls and activities: PE-21, SC-12, SC-13.
    discussion: |-
      The implementation of cryptographic mechanisms that mitigate electromagnetic interference protects systems against intentional jamming that might deny or impair communications by ensuring that wireless spread- spectrum waveforms used to provide anti-jam protection are not predictable by unauthorized individuals. The implementation of cryptographic mechanisms may also coincidentally mitigate the effects of unintentional jamming due to interference from legitimate transmitters that share the same spectrum. Mission requirements, projected threats, concepts of operations, and laws, Orders in Council, directives, regulations, policies, and standards determine the levels of wireless link availability, cryptography needed, and performance.
