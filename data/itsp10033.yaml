    title: "Contingency plan testing: Automated testing"
    text: |-
      Test the contingency plan using [Assignment: organization-defined automated mechanisms].
      Discussion: Automated mechanisms facilitate thorough and effective testing of contingency plans by providing more complete coverage of contingency issues, selecting more realistic test scenarios and environments, and effectively stressing the system and supported mission and business functions.
      Related controls and activities: None.
    discussion: |-
      Automated mechanisms facilitate thorough and effective testing of contingency plans by providing more complete coverage of contingency issues, selecting more realistic test scenarios and environments, and effectively stressing the system and supported mission and business functions.
