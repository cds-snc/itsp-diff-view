    title: "Developer configuration management: Security and privacy representatives"
    text: |-
      Require [Assignment: organization-defined security and privacy representatives] to be included in the [Assignment: organization-defined configuration change management and control process].
      Discussion: Information security and privacy representatives can include system security officers, senior officials in the department’s security governance, appropriate privacy senior officials or executives, and system privacy officers. Representation by personnel with information security and privacy expertise is important because changes to system configurations can have unintended side effects, some of which may be security- or privacy-relevant. Detecting such changes early in the process can help avoid unintended, negative consequences that could ultimately affect the security and privacy posture of systems. The configuration change management and control process in this control enhancement refers to the change management and control process defined by organizations in SA-10B.
      Related controls and activities: None.
