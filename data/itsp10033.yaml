    title: "System partitioning"
    text: |-
      Partition the system into [Assignment: organization-defined system components] residing in separate [Selection (1): physical; logical] domains or environments based on [Assignment: organization-defined circumstances for physical or logical separation of components].
    discussion: |-
      System partitioning is part of a defence-in-depth protection strategy. Organizations determine the degree of physical separation of system components. Physical separation options include physically distinct components in separate racks in the same room, critical components in separate rooms, and geographical separation of critical components. Security categorization can guide the selection of candidates for domain partitioning. Managed interfaces restrict or prohibit network access and information flow among partitioned system components.
