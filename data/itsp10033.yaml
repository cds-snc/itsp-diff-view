    title: "Security and privacy engineering principles: Minimization"
    text: |-
      Implement the privacy principle of minimization using [Assignment: organization-defined processes].
      Discussion: The principle of minimization states that organizations must collect only personal or sensitive information if it relates directly to an operating program or activity of the institution. Along the same lines, organizations must only retain personal or sensitive information for as long as is necessary to accomplish the purpose. In the event that personal or sensitive information is required to be shared with other programs or organizations, the personal or sensitive information shared must be limited to that which is expressly required by the recipient program or organization. Organizations should have processes in place, consistent with applicable laws and policies, to implement the principle of minimization.
      GC discussion: This enhancement is mandatory for GC departments and agencies.
      Related controls and activities: PE-08, PM-25, SC-42, SI-12.
