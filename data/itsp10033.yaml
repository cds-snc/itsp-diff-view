    title: "Contingency plan testing: Alternate processing site"
    text: |-
      Test the contingency plan at the alternate processing site to:
      familiarize contingency personnel with the facility and available resources
      evaluate the capabilities of the alternate processing site to support contingency operations
      Discussion: Conditions at the alternate processing site may be significantly different than the conditions at the primary site. Having the opportunity to visit the alternate site and experience the actual capabilities available at the site can provide valuable information on potential vulnerabilities that could affect essential organizational mission and business functions. The onsite visit can also provide an opportunity to refine the contingency plan to address the vulnerabilities discovered during testing.
