    family: "SA"
    type: "control"
    title: "External system services"
    text: |-
      Require that providers of external system services comply with organizational security and privacy requirements and employ the following controls: [Assignment: organization-defined controls]
      Define and document organizational oversight and user roles and responsibilities with regard to external system services
      Employ the following processes, methods, and techniques to monitor control compliance by external service providers on an ongoing basis: [Assignment: organization-defined processes, methods, and techniques]
    discussion: |-
      External system services are provided by an external provider, and the organization has no direct control over the implementation of the required controls or the assessment of control effectiveness. Organizations establish relationships with external service providers in a variety of ways, including through business partnerships, contracts, inter-agency agreements, lines of business arrangements, licensing agreements, joint ventures, and supply chain exchanges.
      The responsibility for managing risks from using external system services remains with authorizing officials. For services external to organizations, a chain of trust requires that organizations establish and retain a certain level of confidence that each provider in the consumer-provider relationship provides adequate protection for the services rendered. The extent and nature of this chain of trust vary based on relationships between organizations and the external providers. Organizations document the basis for the trust relationships so that the relationships can be monitored.
      External system services documentation includes government, service providers, and end-user security roles and responsibilities, and service-level agreements. Service-level agreements define the performance expectations for implemented controls, describe measurable outcomes, and identify remedies and response requirements for identified instances of non-compliance.
