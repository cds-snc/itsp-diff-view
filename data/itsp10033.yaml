      Discussion: The geographic location of information processing and data storage can have a direct impact on the ability of organizations to successfully execute their mission and business functions. A compromise or breach of high-impact information and systems can have severe adverse or catastrophic impacts on organizational assets and operations, individuals, other organizations, and Canada. Restricting the processing and storage of high-impact information to facilities within the legal jurisdictional boundary of Canada provides greater control over such processing and storage.
