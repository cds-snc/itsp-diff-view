    type: "control"
    title: "Baseline configuration"
    text: |-
      Develop, document, and maintain under configuration control, a current baseline configuration of the system
      Review and update the baseline configuration of the system
      [Assignment: organization-defined frequency]
      when required due to [Assignment: organization-defined circumstances]
      when system components are installed or upgraded
    discussion: |-
      Baseline configurations for systems and system components include connectivity, operational, and communications aspects of systems. Baseline configurations are documented, formally reviewed, and agreed-upon specifications for systems or configuration items within those systems. Baseline configurations serve as a basis for future builds, releases, or changes to systems. They include security and privacy control implementations, operational procedures, information about system components, network topology, and logical placement of components in the system architecture. Maintaining baseline configurations requires creating new baselines as organizational systems change over time. Baseline configurations of systems reflect the current enterprise architecture. If the system facilitates the collection or use of personal information, baseline configurations should include providing privacy notice to users.
