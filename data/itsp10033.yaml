  - canonicalId: "SC-41"
    displayId: "SC-41"
    sourceId: "SC-41"
    family: "SC"
    type: "control"
    title: "Port and input/output device access"
    text: |-
      [Selection (1): Physically; Logically] disable or remove [Assignment: organization-defined connection ports or input/output devices] on the following systems or system components: [Assignment: organization-defined systems or system components].
    discussion: |-
      Disabling or removing connection ports and input/output (I/O) devices helps prevent the exfiltration of information from systems and the introduction of malicious code from those ports or devices. Physically disabling or removing ports and/or devices is the stronger action compared to logical approaches. Examples of connection ports include Universal Serial Bus (USB), Thunderbolt, and Firewire ( IEEE 1394). Examples of I/O devices include optical disc drives, USB thumb drives, monitors, keyboards, and mice.
