    type: "enhancement"
    title: "Developer testing and evaluation: Penetration testing"
    text: |-
      Require the developer of the system, system component, or system service to perform penetration testing:
      at the following level of rigour: [Assignment: organization-defined breadth and depth of testing]
      under the following constraints: [Assignment: organization-defined constraints]
      Discussion: Penetration testing is an assessment methodology in which assessors, using all available IT product or system documentation and working under specific constraints, attempt to circumvent the implemented security and privacy features of IT products and systems.
      Useful information for assessors who conduct penetration testing includes product and system design specifications, source code, and administrator and operator manuals. Penetration testing can include open-box, grey-box, or closed-box testing with analyses performed by skilled professionals who simulate adversary actions.
      The objective of penetration testing is to discover vulnerabilities in systems, system components, and services that result from implementation errors, configuration faults, or other operational weaknesses or deficiencies. Penetration tests can be performed in conjunction with automated and manual code reviews to provide a greater level of analysis than would ordinarily be possible.
      When user session information and other personal information is captured or recorded during penetration testing, such information is handled appropriately to protect privacy.
      Related controls and activities: CA-08, PM-14, PM-25, PT-02, SA-03, SI-02, SI-06.
    discussion: |-
      Penetration testing is an assessment methodology in which assessors, using all available IT product or system documentation and working under specific constraints, attempt to circumvent the implemented security and privacy features of IT products and systems.
