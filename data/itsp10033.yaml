  - canonicalId: "SC-47"
    displayId: "SC-47"
    sourceId: "SC-47"
    family: "SC"
    type: "control"
    title: "Alternate communications paths"
    text: |-
      Establish [Assignment: organization-defined alternate communications paths] for system operations organizational command and control.
    discussion: |-
      An incident, whether adversarial or non-adversarial, can disrupt established communications paths used for system operations and organizational command and control. Alternate communications paths reduce the risk of all communications paths being affected by the same incident. Moreover, the inability of organizational officials to obtain timely information about disruptions or to provide timely direction to operational elements after a communications path incident can impact the ability of the organization to respond to such incidents in a timely manner. Establishing alternate communications paths for command-and-control purposes, including designating alternative decision-makers if primary decision-makers are unavailable and establishing the extent and limitations of their actions, can greatly facilitate the organization’s ability to continue to operate and take appropriate actions during an incident.
    related:
      - "CP-02"
      - "CP-08"
    sourceUrl: |-
      https://www.cyber.gc.ca/en/guidance/cyber-security-privacy-risk-management/itsp10033/system-communications-protection#3.18-SC-47
  - canonicalId: "SC-48"
    displayId: "SC-48"
    sourceId: "SC-48"
    family: "SC"
    type: "control"
    title: "Sensor relocation"
    text: |-
      Relocate [Assignment: organization-defined sensors and monitoring capabilities] to [Assignment: organization-defined locations] under the following conditions or circumstances: [Assignment: organization-defined conditions or circumstances].
    discussion: |-
      Adversaries may take various paths and use different approaches as they move laterally through an organization (including its systems) to reach their target or as they attempt to exfiltrate information from the organization. Organizations often only have a limited set of monitoring and detection capabilities, and they may be focused on the critical or likely infiltration or exfiltration paths.
      By using communications paths that an organization typically does not monitor, an adversary can increase its chances of achieving its desired goals. By relocating its sensors or monitoring capabilities to new locations, an organization can impede the adversary’s ability to achieve its goals. Sensors or monitoring capabilities might be relocated based on threat information that the organization has acquired or relocated randomly to confuse the adversary and make its lateral transition through the system or organization more challenging.
    related:
      - "AU-02"
      - "SC-07"
      - "SI-04"
    sourceUrl: |-
      https://www.cyber.gc.ca/en/guidance/cyber-security-privacy-risk-management/itsp10033/system-communications-protection#3.18-SC-48
