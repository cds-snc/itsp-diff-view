  - canonicalId: "PM-25"
    displayId: "PM-25"
    sourceId: "PM-25"
    family: "PM"
    type: "control"
    title: "Minimization of personal information used in testing, training, and research"
    text: |-
      Develop, document, and implement policies and procedures that address the use of personal information for internal testing, training, and research
      Limit or minimize the amount of personal information used for internal testing, training, and research purposes
      Authorize the use of personal information in internal testing, training, and research when the required result cannot be achieved without the use of the personal information
      Review and update policies and procedures [Assignment: organization-defined frequency]
      Restrict the disclosure of datasets containing personal information to external contractors, wherever possible
    discussion: |-
      The use of personal information in testing, training, and research increases the risk of unauthorized uses and disclosures of such information. Organizations consult with the appropriate privacy senior official or executive and/or legal counsel to ensure that the use of personal information in testing, training, and research is compatible with the original purpose for which it was collected. When possible, organizations use placeholder (de-identified or anonymized) data to avoid exposure of personal information when conducting testing, training, and research. If the use of personal information cannot be avoided in these environments, then the testing, training or research environments become subject to the same control requirements as the original environment.
