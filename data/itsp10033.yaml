  - canonicalId: "SA-17"
    displayId: "SA-17"
    sourceId: "SA-17"
    family: "SA"
    type: "activity"
    title: "Developer security and privacy architecture and design"
    text: |-
      Require the developer of the system, system component, or system service to produce a design specification and security and privacy architecture that:
      is consistent with the organization’s security and privacy architecture that is an integral part the organization’s enterprise architecture
      accurately and completely describes the required security and privacy functionality and the allocation of controls among physical and logical components
      expresses how individual security and privacy functions, mechanisms, and services work together to provide required security and privacy capabilities and a unified approach to protection
    discussion: |-
      Developer security and privacy architecture and design are directed at external developers, although they could also be applied to internal (in-house) development. In contrast, PL-08 is directed at internal developers to ensure that organizations develop a security and privacy architecture that is integrated with the enterprise architecture. The distinction between SA-17 and PL-08 is especially important when organizations outsource the development of systems, system components, or system services and when there is a requirement to demonstrate consistency with the enterprise architecture and security and privacy architecture of the organization.
      ISO/IEC 15408-2, ISO/IEC 15408-3, and the Cyber Centre’s System lifecycle cyber security and privacy risk management activities (ITSP.10.037) provide information on security architecture and design, including formal policy models, security-relevant components, formal and informal correspondence, conceptually simple design, and structuring for least privilege and testing.
    related:
