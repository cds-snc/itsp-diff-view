  - canonicalId: "SA-11.09"
    displayId: "SA-11 (09)"
    sourceId: "SA-11 (09)"
    family: "SA"
    type: "enhancement"
    title: "Developer testing and evaluation: Interactive application security testing"
    text: |-
      Require the developer of the system, system component, or system service to employ interactive application security testing tools to identify flaws and document the results.
      Discussion: Interactive (also known as instrumentation-based) application security testing is a method of detecting vulnerabilities by observing applications as they run during testing. The use of instrumentation relies on direct measurements of the actual running applications and uses access to the code, user interaction, libraries, frameworks, backend connections, and configurations to directly measure control effectiveness.
      When combined with analysis techniques, interactive application security testing can identify potential vulnerabilities and confirm control effectiveness. Instrumentation-based testing works in real time and can be used continuously throughout the system development lifecycle.
      Related controls and activities: None.
    discussion: |-
