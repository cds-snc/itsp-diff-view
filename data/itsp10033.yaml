  - canonicalId: "SC-11.01"
    displayId: "SC-11 (01)"
    sourceId: "SC-11 (01)"
    family: "SC"
    type: "enhancement"
    title: "Trusted path: Irrefutable communications path"
    text: |-
      Provide a trusted communications path that is irrefutably distinguishable from other communications paths
      Initiate the trusted communications path for communications between the [Assignment: organization-defined security functions] of the system and the user
      Discussion: An irrefutable communications path permits the system to initiate a trusted path, which necessitates that the user can unmistakably recognize the source of the communication as a trusted system component. For example, the trusted path may appear in an area of the display that other applications cannot access or be based on the presence of an identifier that cannot be spoofed.
      Related controls and activities: None.
