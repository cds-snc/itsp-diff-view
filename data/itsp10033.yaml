  - canonicalId: "SA-08.01"
    displayId: "SA-08 (01)"
    sourceId: "SA-08 (01)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Clear abstractions"
    text: |-
      Implement the security design principle of clear abstractions.
      Discussion: The principle of clear abstractions states that a system has simple, well-defined interfaces and functions that provide a consistent and intuitive view of the data and how the data is managed. The clarity, simplicity, necessity, and sufficiency of the system interfaces — combined with a precise definition of their functional behaviour — promotes ease of analysis, inspection, and testing, as well as the correct and secure use of the system. The clarity of an abstraction is subjective.
      Examples that reflect the application of this principle include avoiding redundant, unused interfaces; information hiding; and avoiding semantic overloading of interfaces or their parameters. Information hiding (i.e., representation-independent programming) is a design discipline used to ensure that the internal representation of information in one system component is not visible to another system component invoking or calling the first component, such that the published abstraction is not influenced by how the data may be managed internally.
      Related controls and activities: None.
    discussion: |-
      The principle of clear abstractions states that a system has simple, well-defined interfaces and functions that provide a consistent and intuitive view of the data and how the data is managed. The clarity, simplicity, necessity, and sufficiency of the system interfaces — combined with a precise definition of their functional behaviour — promotes ease of analysis, inspection, and testing, as well as the correct and secure use of the system. The clarity of an abstraction is subjective.
