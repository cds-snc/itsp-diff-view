    family: "CM"
    type: "enhancement"
    title: "Impact analyses: Separate test environments"
    text: |-
      Analyze changes to the system in a separate test environment before implementation in an operational environment, looking for security and privacy impacts due to flaws, weaknesses, incompatibility, or intentional malice.
      Discussion: A separate test environment must be physically or logically separate and distinct from the operational environment. The separation is sufficient to ensure that activities in the test environment do not impact activities in the operational environment and that information in the operational environment is not inadvertently transmitted to the test environment. Separate environments can be achieved by physical or logical means. If physically separate test environments are not implemented, organizations determine the strength of mechanism required when implementing logical separation.
      Related controls and activities: SA-11, SC-07.
    discussion: |-
