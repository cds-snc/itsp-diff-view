    family: "SA"
    type: "control"
    title: "Developer-provided training"
    text: |-
      Require the developer of the system, system component, or system service to provide the following training on the correct use and operation of the implemented security and privacy functions, controls, and/or mechanisms: [Assignment: organization-defined training].
    discussion: |-
      Developer-provided training applies to external and internal (in-house) developers. Personnel training is essential to ensuring the effectiveness of the controls implemented within organizational systems. Training may be web-based, computer-based, classroom style, or hands-on (including micro-training). Organizations can also request training materials from developers to conduct in-house training or offer self-training to organizational personnel. Organizations determine the type of training necessary and may require different types of training for different security and privacy functions, controls, and mechanisms.
