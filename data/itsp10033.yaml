  - canonicalId: "SA-08.14"
    displayId: "SA-08 (14)"
    sourceId: "SA-08 (14)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Least privilege"
    text: |-
      Implement the security design principle of least privilege in [Assignment: organization-defined systems or system components].
      Discussion: The principle of least privilege states that each system component is allocated sufficient privileges to accomplish its specified functions but no more. Applying the principle of least privilege limits the scope of the component’s actions, which has 2 desirable effects: the security impact of a failure, corruption, or misuse of the component will have a smaller security impact, and the security analysis of the component will be simplified. Least privilege is a pervasive principle that is reflected in all aspects of the secure system design. Interfaces used to invoke component capability are available to only certain subsets of the user population, and component design supports a sufficiently fine granularity of privilege decomposition.
      For example, in the case of an audit mechanism, there may be an interface for the audit manager, who configures the audit settings; an interface for the audit operator, who ensures that audit data is safely collected and stored; and, finally, yet another interface for the audit reviewer, who only needs to view the audit data that has been collected but does not need to perform operations on that data.
      In addition to its manifestations at the system interface, least privilege can be used as a guiding principle for the internal structure of the system itself. One aspect of internal least privilege is to construct modules so that only the elements encapsulated by the module are directly operated on by the functions within the module. Elements external to a module that may be affected by the module’s operation are indirectly accessed through interaction (e.g., via a function call) with the module that contains those elements. Another aspect of internal least privilege is that the scope of a given module or component includes only those system elements that are necessary for its functionality and that the access modes for the elements (e.g., read, write) are minimal. An example of least privilege in software development is minimizing the functions that operate with elevated privileges (for example, limiting the tools and functions that operate in kernel mode).
      Related controls and activities: AC-06, CM-07.
