    title: "Developer security and privacy architecture and design: Orchestration"
    text: |-
      Design [Assignment: organization-defined critical systems or system components] with coordinated behaviour to implement the following capabilities: [Assignment: organization-defined capabilities, by system or component].
      Discussion: Security resources that are distributed, located at different layers or in different system elements can interact in unforeseen or incorrect ways. Adverse consequences can include cascading failures, interference, or coverage gaps. Coordination of the behaviour of security resources (e.g., by ensuring that one patch is installed across all resources before making a configuration change that assumes that the patch is propagated) can avert such negative interactions.
      Related controls and activities: None.
