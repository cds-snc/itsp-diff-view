  - canonicalId: "SA-08.05"
    displayId: "SA-08 (05)"
    sourceId: "SA-08 (05)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Efficiently mediated access"
    text: |-
      Implement the security design principle of efficiently mediated access in [Assignment: organization-defined systems or system components].
      Discussion: The principle of efficiently mediated access states that policy enforcement mechanisms utilize the least common mechanism available while satisfying stakeholder requirements within expressed constraints. The mediation of access to system resources (i.e., CPU, memory, devices, communication ports, services, infrastructure, data, and information) is often the predominant security function of secure systems. It also enables the realization of protections for the capability provided to stakeholders by the system.
      Mediation of resource access can result in performance bottlenecks if the system is not designed correctly. For example, efficiently mediated access can be achieved by using hardware mechanisms. Once access to a low-level resource such as memory has been obtained, hardware protection mechanisms can ensure that out-of-bounds access does not occur.
      Related controls and activities: AC-25.
