  - canonicalId: "SA-04.09"
    displayId: "SA-04 (09)"
    sourceId: "SA-04 (09)"
    family: "SA"
    type: "enhancement"
    title: "Acquisition process: Functions, ports, protocols, and services in use"
    text: |-
      Require the developer of the system, system component, or system service to identify the functions, ports, protocols, and services intended for organizational use.
      Discussion: The identification of functions, ports, protocols, and services early in the system development lifecycle (e.g., during the initial requirements definition and design stages) allows organizations to influence the design of the system, system component, or system service.
      This early involvement in the system development lifecycle helps organizations avoid or minimize the use of functions, ports, protocols, or services that pose unnecessarily high risks and understand the trade-offs involved in blocking specific ports, protocols, or services or requiring system service providers to do so.
      Early identification of functions, ports, protocols, and services avoids costly retrofitting of controls after the system, component, or system service has been implemented. SA-09 describes the requirements for external system services. Organizations identify which functions, ports, protocols, and services are provided from external sources.
      Related controls and activities: CM-07, SA-09.
