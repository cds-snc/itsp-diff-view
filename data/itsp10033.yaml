    title: "Sensor capability and data: Notice of collection"
    text: |-
      Employ the following measures to facilitate an individual’s awareness that personal information is being collected by [Assignment: organization-defined sensors]: [Assignment: organization-defined measures].
      Discussion: Obtain legal advice before collecting sensor data on employer-issued devices. When individuals are aware that organizational sensors are collecting data, they can engage more effectively in managing their privacy. Measures can include conventional written notices or sensor configurations that make individuals directly or indirectly aware through other devices that the sensor is collecting information. The clarity of the notice is an important consideration.
      GC discussion: There are both privacy and Charter implications with the use of sensor technology, and further assessment by organizational counsel may be required. It is important to notify users of employer-issued technologies about the potential infringement of their personal information and that users acknowledge these risks before using the device.
