    type: "enhancement"
    title: "Boundary protection: Restrict threatening outgoing communications traffic"
    text: |-
      Detect and deny outgoing communications traffic posing a threat to external systems
      Audit the identity of internal users associated with denied communications
      Discussion: Detecting outgoing communications traffic from internal actions that may pose threats to external systems is known as extrusion detection. Extrusion detection is carried out within the system at managed interfaces. Extrusion detection includes the analysis of incoming and outgoing communications traffic while searching for indications of internal threats to the security of external systems.
      Internal threats to external systems include traffic indicative of denial-of-service attacks, traffic with spoofed source addresses, and traffic that contains malicious code. Organizations should have criteria to determine, update, and manage identified threats related to extrusion detection.
      Related controls and activities: AU-02, AU-06, SC-05, SC-38, SC-44, SI-03, SI-04.
