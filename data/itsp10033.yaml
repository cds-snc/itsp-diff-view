  - canonicalId: "SA-08.10"
    displayId: "SA-08 (10)"
    sourceId: "SA-08 (10)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Hierarchical trust"
    text: |-
      Implement the security design principle of hierarchical trust in [Assignment: organization-defined systems or system components].
      Discussion: The principle of hierarchical trust for components builds on the principle of trusted components and states that the security dependencies in a system will form a partial ordering if they preserve the principle of trusted components. The partial ordering provides the basis for both trustworthiness and robustness reasoning when composing a secure system from independently developed or sourced components.
      To analyze a system composed of independently developed or sourced components for both trustworthiness and robustness, it is essential to eliminate circular dependencies. If a more trustworthy or robust component located in a lower layer of the system were to depend on a less trustworthy or less robust component in a higher layer, this would reduce the overall trust or the robustness of the system to that of the weaker element that is being depended upon.
      Trust relationships, or chains of trust, can have various manifestations. For example, the root certificate of a certificate hierarchy is the most trusted node in the hierarchy, whereas the leaves in the hierarchy may be less trustworthy nodes. Another example occurs in a layered high-assurance system where the security kernel (including the hardware base), which is located at the lowest layer of the system, is the most trustworthy component.
      The principle of hierarchical trust, however, does not prohibit the use of overly trustworthy components. There may be cases in a system of low trustworthiness where it is reasonable to employ a highly trustworthy component rather than one that is less trustworthy (e.g., due to availability or another cost-benefit driver). For such a case, any dependency of the highly trustworthy component upon a less trustworthy component does not degrade the trustworthiness of the resulting low-trust system, nor does it raise its trustworthiness or robustness.
      Related controls and activities: None.
    discussion: |-
      The principle of hierarchical trust for components builds on the principle of trusted components and states that the security dependencies in a system will form a partial ordering if they preserve the principle of trusted components. The partial ordering provides the basis for both trustworthiness and robustness reasoning when composing a secure system from independently developed or sourced components.
      To analyze a system composed of independently developed or sourced components for both trustworthiness and robustness, it is essential to eliminate circular dependencies. If a more trustworthy or robust component located in a lower layer of the system were to depend on a less trustworthy or less robust component in a higher layer, this would reduce the overall trust or the robustness of the system to that of the weaker element that is being depended upon.
