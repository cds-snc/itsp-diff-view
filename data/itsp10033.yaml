  - canonicalId: "SA-08.07"
    displayId: "SA-08 (07)"
    sourceId: "SA-08 (07)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Reduced complexity"
    text: |-
      Implement the security design principle of reduced complexity in [Assignment: organization-defined systems or system components].
      Discussion: The principle of reduced complexity states that the system design is as simple and small as possible. A small and simple design is more understandable, more analyzable, and less prone to error. The reduced complexity principle applies to any aspect of a system, but it has particular importance for security due to the various analyses performed to obtain evidence about the emergent security property of the system. For such analyses to be successful, a small and simple design is essential.
      Application of the principle of reduced complexity contributes to the ability of system developers to understand the correctness and completeness of system security functions. It also facilitates the identification of potential vulnerabilities. The corollary of reduced complexity states that the simplicity of the system is directly related to the number of vulnerabilities it will contain; that is, simpler systems contain fewer vulnerabilities.
      Benefits of reduced complexity are that it is easier to understand whether the intended security policy has been captured in the system design and that fewer vulnerabilities are likely to be introduced during engineering development. An additional benefit is that any such conclusion about correctness, completeness, and the existence of vulnerabilities can be reached with a higher degree of assurance in contrast to conclusions reached in situations where the system design is inherently more complex.
      Transitioning from older technologies to newer technologies (e.g., transitioning from Ipv4 to Ipv6) may require implementing the older and newer technologies simultaneously during the transition period. This may result in a temporary increase in system complexity during the transition.
      Related controls and activities: None.
    discussion: |-
