  - canonicalId: "SA-05"
    displayId: "SA-05"
    sourceId: "SA-05"
    family: "SA"
    type: "activity"
    title: "System documentation"
    text: |-
      Obtain or develop administrator documentation for the system, system component, or system service that describes
      secure configuration, installation, and operation of the system, component, or service
      effective use and maintenance of security and privacy functions and mechanisms
      known vulnerabilities regarding configuration and use of administrative or privileged functions
      Obtain or develop user documentation for the system, system component, or system service that describes
      user-accessible security and privacy functions and mechanisms and how to effectively use those functions and mechanisms
      methods for user interaction, which enable individuals to use the system, component, or service in a more secure manner and protect individual privacy
      user responsibilities in maintaining the security of the system, component, or service and privacy of individuals
      Document attempts to obtain system, system component, or system service documentation when such documentation is either unavailable or non-existent and take [Assignment: organization-defined actions] in response
      Distribute documentation to [Assignment: organization-defined personnel or roles]
    discussion: |-
      System artifacts and documentation created by the developer helps organizational personnel understand the implementation and operation of controls. Organizations consider establishing specific measures to determine the quality and completeness of the content provided. System documentation may be used to delineate roles, responsibilities, and expectations of the developer and organization, support the management of supply chain risk, incident response, and other functions. Personnel or roles that require documentation include system owners, system security officers, and system administrators. Attempts to obtain documentation include contacting manufacturers or suppliers and conducting web-based searches.
      The inability to obtain documentation may occur due to the age of the system or component or the lack of support from developers and contractors. When documentation cannot be obtained, organizations may need to recreate the documentation if it is essential to the implementation or operation of the controls.
      The protection provided for the documentation is commensurate with the security category or classification of the system. Documentation that addresses system vulnerabilities may require an increased level of protection. Secure operation of the system includes initially starting the system and resuming secure system operation after a lapse in system operation.
