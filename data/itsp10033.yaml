  - canonicalId: "PL-08.01"
    displayId: "PL-08 (01)"
    sourceId: "PL-08 (01)"
    family: "PL"
    type: "enhancement"
    title: "Security and privacy architectures: Defence in depth"
    text: |-
      Design the security and privacy architectures for the system using a defence-in-depth approach that:
      allocates [Assignment: organization-defined controls] to [Assignment: organization-defined locations and architectural layers]
      ensures that the allocated controls operate in a coordinated and mutually reinforcing manner
      Discussion: Organizations strategically allocate security and privacy controls in the security and privacy architectures so that adversaries must overcome multiple controls to achieve their objective. Requiring adversaries to defeat multiple controls makes it more difficult to attack information resources by increasing the work factor of the adversary; it also increases the likelihood of detection. The coordination of allocated controls is essential to ensure that an attack that involves one control does not create adverse, unintended consequences by interfering with other controls. Unintended consequences can include system lock-out and cascading alarms.
      The placement of controls in systems and organizations is an important activity that requires thoughtful analysis. The value of organizational assets is an important consideration in providing additional layering. Defence-in-depth architectural approaches include modularity and layering (see SA-08(03)), separation of system and user functionality (see SC-02), and security function isolation (see SC-03).
      Related controls and activities: SC-02, SC-03, SC-29, SC-36.
    discussion: |-
      Organizations strategically allocate security and privacy controls in the security and privacy architectures so that adversaries must overcome multiple controls to achieve their objective. Requiring adversaries to defeat multiple controls makes it more difficult to attack information resources by increasing the work factor of the adversary; it also increases the likelihood of detection. The coordination of allocated controls is essential to ensure that an attack that involves one control does not create adverse, unintended consequences by interfering with other controls. Unintended consequences can include system lock-out and cascading alarms.
      The placement of controls in systems and organizations is an important activity that requires thoughtful analysis. The value of organizational assets is an important consideration in providing additional layering. Defence-in-depth architectural approaches include modularity and layering (see SA-08(03)), separation of system and user functionality (see SC-02), and security function isolation (see SC-03).
