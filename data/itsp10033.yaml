  - canonicalId: "RA-03"
    displayId: "RA-03"
    sourceId: "RA-03"
    family: "RA"
    type: "activity"
    title: "Risk assessment"
    text: |-
      Conduct a risk assessment, including
      identifying threats to and vulnerabilities in the system
      determining the likelihood and magnitude of harm from unauthorized access, use, disclosure, disruption, modification, or destruction of the system, the information it handles, stores, or transmits, and any related information
      determining the likelihood and impact of adverse effects on individuals arising from the handling of personal information
      Integrate risk assessment results and risk management decisions from the organization and mission or business process perspectives with system-level risk assessments
      Document risk assessment results in [Selection (1): security and privacy plans; risk assessment report; [Assignment: organization-defined document]]
      Review risk assessment results [Assignment: organization-defined frequency]
      Disseminate risk assessment results to [Assignment: organization-defined personnel or roles]
      Update the risk assessment [Assignment: organization-defined frequency] or when there are significant changes to the system, its environment of operation, or other conditions that may impact the security or privacy state of the system
    discussion: |-
      Risk assessments should consider threats, vulnerabilities, likelihood, and impact to organizational operations and assets, individuals, other organizations, and Canada. Risk assessments should also consider risk from external parties, including contractors who operate systems on behalf of the organization, individuals who access organizational systems, service providers, and outsourcing entities.
      Organizations can conduct risk assessments at all 3 levels in the risk management hierarchy (i.e., organization level, mission/business process level, or information system level) and at any stage in the system development lifecycle. Risk assessments can also be conducted at various steps in the risk management process, such as Organizational cyber security and privacy risk management activities (ITSP.10.036), including preparation, categorization, control selection and allocation, control implementation, control assessment, authorization, and control monitoring. Risk assessment is an ongoing activity carried out throughout the system development lifecycle.
      Risk assessments can also address information related to the system, including system design, the intended use of the system, testing results, and supply chain-related information or artifacts. Risk assessments can play an important role in control selection processes, particularly during the application of tailoring guidance and in the earliest phases of capability determination.
