    type: "enhancement"
    title: "Sensor capability and data: Collection minimization"
    text: |-
      Employ [Assignment: organization-defined sensors] that are configured to minimize the collection of information about individuals that is not needed.
      Discussion: Although policies that constrain authorized use can be applied to information once it is collected, minimizing the collection of information that is not needed mitigates privacy and Charter risk and mitigates the risk of policy control failures.
      GC discussion: In addition, for the use of the technologies that can be considered privacy-invasive, the OPC asks that Charter implications be considered, in line with the R. vs. Oakes Supreme Court decision. Bearing in mind the concept of unreasonable search and seizure, organizations should assess collection of information that may infringe on Charter rights against the principles set out in the aforementioned Oakes decision.
