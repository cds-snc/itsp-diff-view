  - canonicalId: "SA-08.06"
    displayId: "SA-08 (06)"
    sourceId: "SA-08 (06)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Minimized sharing"
    text: |-
      Implement the security design principle of minimized sharing in [Assignment: organization-defined systems or system components].
      Discussion: The principle of minimized sharing states that no computer resource is shared between system components (e.g., subjects, processes, functions) unless it is absolutely necessary to do so. Minimized sharing helps to simplify system design and implementation.
      To protect user-domain resources from arbitrary active entities, no resource is shared unless that sharing has been explicitly requested and granted. The need for resource sharing can be motivated by the design principle of least common mechanism in the case of internal entities or driven by stakeholder requirements. However, internal sharing is carefully designed to avoid problem related to performance, covert storage, and timing channel problems.
      Sharing via common mechanism can increase the susceptibility of data and information to unauthorized access, disclosure, use, or modification and can adversely affect the inherent capability provided by the system. To minimize sharing induced by common mechanisms, such mechanisms can be designed to be re-entrant or virtualized to preserve separation. Moreover, the use of global data to share information is carefully scrutinized. The lack of encapsulation may obfuscate relationships among the sharing entities.
      Related controls and activities: SC-31.
