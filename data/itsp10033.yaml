  - canonicalId: "SA-08.17"
    displayId: "SA-08 (17)"
    sourceId: "SA-08 (17)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Secure distributed composition"
    text: |-
      Implement the security design principle of secure distributed composition in [Assignment: organization-defined systems or system components].
      Discussion: The principle of secure distributed composition states that the composition of distributed components that enforce the same system security policy result in a system that enforces that policy at least as well as the individual components do.
      Many of the design principles for secure systems deal with how components can or should interact. The need to create or enable a capability from the composition of distributed components can magnify the relevancy of these principles. In particular, the translation of security policy from a standalone to a distributed system or a system-of-systems can have unexpected or emergent results.
      Communication protocols and distributed data consistency mechanisms help to ensure consistent policy enforcement across a distributed system. To ensure a system-wide level of assurance of correct policy enforcement, the security architecture of a distributed composite system is thoroughly analyzed.
      Related controls and activities: None.
    discussion: |-
      The principle of secure distributed composition states that the composition of distributed components that enforce the same system security policy result in a system that enforces that policy at least as well as the individual components do.
