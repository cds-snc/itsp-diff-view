  - canonicalId: "SA-08.20"
    displayId: "SA-08 (20)"
    sourceId: "SA-08 (20)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Secure metadata management"
    text: |-
      Implement the security design principle of secure metadata management in [Assignment: organization-defined systems or system components].
      Discussion: The principle of secure metadata management states that metadata is a first-class object with respect to security policy when the policy requires either complete protection of information or that the security subsystem be self-protecting. The principle of secure metadata management is driven by the recognition that a system, subsystem, or component cannot achieve self-protection unless it protects the data it relies on for correct execution.
      Data is generally not interpreted by the system that stores it. It may have semantic value (i.e., it comprises information) to users and programs that process the data. In contrast, metadata is information about data, such as a file name or the date when the file was created. Metadata is bound to the target data that it describes in a way that the system can interpret, but it need not be stored inside of or proximate to its target data. There may be metadata whose target is itself metadata (e.g., the classification level or impact level of a file name), including self-referential metadata.
      The apparent secondary nature of metadata can lead to neglect of its legitimate need for protection, resulting in a violation of the security policy that includes the exfiltration of information. A particular concern associated with insufficient protections for metadata is associated with multilevel secure (MLS) systems. MLS systems mediate access by a subject to an object based on relative sensitivity levels. It follows that all subjects and objects in the scope of control of the MLS system are either directly labelled or indirectly attributed with sensitivity levels.
      The corollary of labelled metadata for MLS systems states that objects containing metadata are labelled. As with protection needs assessments for data, attention is given to ensure that the confidentiality and integrity protections are individually assessed, specified, and allocated to metadata, as would be done for mission, business, and system data.
      Related controls and activities: None.
    discussion: |-
      The principle of secure metadata management states that metadata is a first-class object with respect to security policy when the policy requires either complete protection of information or that the security subsystem be self-protecting. The principle of secure metadata management is driven by the recognition that a system, subsystem, or component cannot achieve self-protection unless it protects the data it relies on for correct execution.
