    family: "SC"
    type: "enhancement"
    title: "Wireless link protection: Reduce detection potential"
    text: |-
      Implement cryptographic mechanisms to reduce the detection potential of wireless links to [Assignment: organization-defined level of reduction].
      Discussion: The implementation of cryptographic mechanisms to reduce detection potential is used for covert communications and to protect wireless transmitters from geolocation. It also ensures that the spread-spectrum waveforms used to achieve a low probability of detection are not predictable by unauthorized individuals. Mission requirements, projected threats, concepts of operations, and applicable laws, Orders in Council, directives, regulations, policies, and standards determine the levels to which wireless links are undetectable.
      Related controls and activities: SC-12, SC-13.
