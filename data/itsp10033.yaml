    title: "System backup: Redundant secondary system"
    text: |-
      Conduct system backup by maintaining a redundant secondary system that is not collocated with the primary system and that can be activated without loss of information or disruption to operations.
      Discussion: The effect of system backup can be achieved by maintaining a redundant secondary system that mirrors the primary system, including the replication of information. If this type of redundancy is in place and there is sufficient geographic separation between the 2 systems, the secondary system can also serve as the alternate processing site.
      Related controls and activities: CP-07.
