    family: "SA"
    type: "enhancement"
    title: "Developer security and privacy architecture and design: Formal policy model"
    text: |-
      Require the developer of the system, system component, or system service to:
      produce, as an integral part of the development process, a formal policy model describing the [Assignment: organization-defined elements of organizational security and privacy policy] to be enforced
      prove that the formal policy model is internally consistent and sufficient to enforce the defined elements of the organizational security and privacy policy when implemented
      Discussion: Formal models describe specific behaviours or security and privacy policies using formal languages, thus enabling the correctness of those behaviours and policies to be formally proven. Not all components of systems can be modelled. Generally, formal specifications are scoped to the behaviours or policies of interest, such as non-discretionary access control policies. Organizations choose the formal modelling language and approach based on the nature of the behaviours and policies to be described and the available tools.
      Related controls and activities: AC-03, AC-04, AC-25.
    discussion: |-
      Formal models describe specific behaviours or security and privacy policies using formal languages, thus enabling the correctness of those behaviours and policies to be formally proven. Not all components of systems can be modelled. Generally, formal specifications are scoped to the behaviours or policies of interest, such as non-discretionary access control policies. Organizations choose the formal modelling language and approach based on the nature of the behaviours and policies to be described and the available tools.
    related:
      - "AC-03"
      - "AC-04"
      - "AC-25"
