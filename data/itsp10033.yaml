  - canonicalId: "SA-08.32"
    displayId: "SA-08 (32)"
    sourceId: "SA-08 (32)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Sufficient documentation"
    text: |-
      Implement the security design principle of sufficient documentation in [Assignment: organization-defined systems or system components].
      Discussion: The principle of sufficient documentation states that organizational personnel with responsibilities to interact with the system are provided with adequate documentation and other information such that the personnel contribute to, rather than detract from, system security. Despite attempts to comply with principles such as human-factored security and acceptable security, systems are inherently complex, and the design intent for the use of security mechanisms and the ramifications of the misuse or misconfiguration of security mechanisms are not always obvious.
      Uninformed and insufficiently trained users can introduce vulnerabilities due to errors of omission and commission. The availability of documentation and training can help to ensure a knowledgeable cadre of personnel, all of whom have a critical role in the achievement of principles such as continuous protection. Documentation is written clearly and supported by training that provides security awareness and understanding of security-relevant responsibilities.
      Related controls and activities: AT-02, AT-03, SA-05.
    discussion: |-
      The principle of sufficient documentation states that organizational personnel with responsibilities to interact with the system are provided with adequate documentation and other information such that the personnel contribute to, rather than detract from, system security. Despite attempts to comply with principles such as human-factored security and acceptable security, systems are inherently complex, and the design intent for the use of security mechanisms and the ramifications of the misuse or misconfiguration of security mechanisms are not always obvious.
      Uninformed and insufficiently trained users can introduce vulnerabilities due to errors of omission and commission. The availability of documentation and training can help to ensure a knowledgeable cadre of personnel, all of whom have a critical role in the achievement of principles such as continuous protection. Documentation is written clearly and supported by training that provides security awareness and understanding of security-relevant responsibilities.
