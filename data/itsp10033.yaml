  - canonicalId: "SA-08.25"
    displayId: "SA-08 (25)"
    sourceId: "SA-08 (25)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Economic security"
    text: |-
      Implement the security design principle of economic security in [Assignment: organization-defined systems or system components].
      Discussion: The principle of economic security states that security mechanisms are not costlier than the potential damage that could occur from a security breach. This is the security-relevant form of the cost-benefit analyses used in risk management. The cost assumptions of cost-benefit analysis prevent the system designer from incorporating security mechanisms of greater strength than necessary, where strength of mechanism is proportional to cost. The principle of economic security also requires analysis of the benefits of assurance relative to the cost of that assurance in terms of the effort expended to obtain relevant and credible evidence.
      Related controls and activities: RA-03.
    discussion: |-
      The principle of economic security states that security mechanisms are not costlier than the potential damage that could occur from a security breach. This is the security-relevant form of the cost-benefit analyses used in risk management. The cost assumptions of cost-benefit analysis prevent the system designer from incorporating security mechanisms of greater strength than necessary, where strength of mechanism is proportional to cost. The principle of economic security also requires analysis of the benefits of assurance relative to the cost of that assurance in terms of the effort expended to obtain relevant and credible evidence.
