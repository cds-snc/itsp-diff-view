    displayId: "SA-11 (07)"
    sourceId: "SA-11 (07)"
    family: "SA"
    type: "enhancement"
    title: "Developer testing and evaluation: Verify scope of testing and evaluation"
    text: |-
      Require the developer of the system, system component, or system service to verify that the scope of testing and evaluation provides complete coverage of the required controls at the following level of rigour: [Assignment: organization-defined breadth and depth of testing and evaluation].
      Discussion: Verifying that testing and evaluation provides complete coverage of required controls can be accomplished by a variety of informal and formal analytic techniques. Each of these techniques provides an increasing level of assurance that corresponds to the degree of formality of the analysis. Rigorously demonstrating control coverage at the highest levels of assurance can be achieved using formal modelling and analysis techniques, including correlation between control implementation and corresponding test cases.
      Related controls and activities: SA-15.
