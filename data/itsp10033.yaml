    title: "Maintenance personnel: Individuals without appropriate access"
    text: |-
      Implement procedures for the use of maintenance personnel that lack appropriate security clearances, that include the following requirements
      maintenance personnel who do not have the needed access authorizations, clearances, or formal access approvals are escorted and supervised during the performance of maintenance and diagnostic activities on the system by approved organizational personnel who are fully cleared, have appropriate access authorizations, and are technically qualified
      prior to initiating maintenance or diagnostic activities by personnel who do not have the needed access authorizations, clearances, or formal access approvals, all volatile information storage components within the system are sanitized and all non-volatile storage media are removed or physically disconnected from the system and secured
      Develop and implement [Assignment: organization-defined alternate controls] in the event a system component cannot be sanitized, removed, or disconnected from the system
      Discussion: Procedures for individuals who lack appropriate security clearances are intended to deny visual and electronic access to classified or protected information contained on organizational systems. Procedures for the use of maintenance personnel can be documented in security plans for the systems.
