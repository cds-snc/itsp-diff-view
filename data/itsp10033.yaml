  - canonicalId: "IA-05.02"
    displayId: "IA-05 (02)"
    sourceId: "IA-05 (02)"
    family: "IA"
    type: "enhancement"
    title: "Authenticator management: Public key-based authentication"
    text: |-
      For public key-based authentication
      enforce authorized access to the corresponding private key
      map the authenticated identity to the account of the individual or group
      When PKI is used
      validate certificates by constructing and verifying a certification path to an accepted trust anchor, including checking certificate status information
      implement a local cache of revocation data to support path discovery and validation
      Discussion: Public key cryptography is a valid authentication mechanism for individuals, machines, and devices. For PKI solutions, status information for certification paths includes certificate revocation lists or certificate status protocol responses. Implementing a local cache of revocation data to support path discovery and validation also supports system availability in situations where organizations are unable to access revocation information via the network.
      Related controls and activities: IA-03, SC-17.
