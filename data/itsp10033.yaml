      Discussion: Alternate configuration management processes may be required when organizations use COTS IT products. Alternate configuration management processes include organizational personnel who review and approve proposed changes to systems, system components, and system services and who conduct security and privacy impact analyses prior to the implementation of changes to systems, components, or services.
