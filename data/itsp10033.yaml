  - canonicalId: "SA-04"
    displayId: "SA-04"
    sourceId: "SA-04"
    family: "SA"
    type: "control"
    title: "Acquisition process"
    text: |-
      Include the following requirements, descriptions, and criteria, explicitly or by reference, using [Selection (1 or more): standardized contract language; [Assignment: organization-defined contract language]] in the acquisition contract for the system, system component, or system service:
      security and privacy functional requirements
      strength of mechanism requirements
      security and privacy assurance requirements
      controls needed to satisfy the security and privacy requirements
      security and privacy documentation requirements
      requirements for protecting security and privacy documentation
      a description of the system development environment and the environment in which the system is intended to operate
      the allocation of responsibility or identification of parties responsible for information security, privacy, and supply chain risk management
      acceptance criteria
    discussion: |-
      Security and privacy functional requirements are typically derived from the high-level security and privacy requirements described in SA-02. The derived requirements include security and privacy capabilities, functions, and mechanisms. Strength requirements associated with such capabilities, functions, and mechanisms include degree of correctness, completeness, resistance to tampering or bypass, and resistance to direct attack.
      Assurance requirements can be specified in a statement of work as part of a contract and can include development processes, procedures, and methodologies, as well as the evidence from development and assessment activities that provide grounds for confidence that the required functionality is implemented and possesses the required strength of mechanism. The Cyber Centre publication System lifecycle cyber security and privacy risk management activities (ITSP.10.037) describes the process of requirements engineering as part of the system development lifecycle.
      Controls can be viewed as descriptions of the safeguards and protection capabilities appropriate for achieving the particular security and privacy objectives of the organization and for reflecting the security and privacy requirements of stakeholders. Controls are selected and implemented to satisfy system requirements and include developer and organizational responsibilities. Controls can include technical, administrative, privacy, and physical aspects. In some cases, the selection and implementation of a control may necessitate additional specification by the organization in the form of derived requirements or instantiated control parameter values. The derived requirements and control parameter values may be necessary to provide the appropriate level of implementation detail for controls within the system development lifecycle.
      Security and privacy documentation requirements address all stages of the system development lifecycle. Documentation provides user and administrator guidance for the implementation and operation of controls. The level of detail required in such documentation is based on the security categorization or classification level of the system and the degree to which organizations depend on the capabilities, functions, or mechanisms to meet risk response expectations. Requirements can include mandated configuration settings that specify allowed functions, ports, protocols, and services. Acceptance criteria for systems, system components, and system services are defined in the same manner as the criteria for any organizational acquisition or procurement.
      Organizations can determine other requirements that support security and operations, to include responsibilities for the organization and developer, and notification and timing requirements for support, maintenance and updates.
