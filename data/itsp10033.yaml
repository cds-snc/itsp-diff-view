    displayId: "SC-07 (21)"
    sourceId: "SC-07 (21)"
    family: "SC"
    type: "enhancement"
    title: "Boundary protection: Isolation of system components"
    text: |-
      Employ boundary protection mechanisms to isolate [Assignment: organization-defined system components] supporting [Assignment: organization-defined missions and/or business functions].
      Discussion: Organizations can isolate system components that perform different mission or business functions. Such isolation limits unauthorized information flows among system components and provides the opportunity to deploy greater levels of protection for selected system components.
      Isolating system components with boundary protection mechanisms provides the capability for increased protection of individual system components and to control information flows more effectively between those components. Isolating system components provides enhanced protection that limits the potential harm from hostile cyber attacks and errors.
      The degree of isolation varies depending on the mechanisms chosen. Boundary protection mechanisms include routers, gateways, and firewalls that separate system components into separate networks or subnetworks; cross-domain devices that separate subnetworks; virtualization techniques; the encryption of information flows among system components using distinct encryption keys and complete physical/electrical isolation of the relevant network/system from all other networks (also known as air gapping).
      Related controls and activities: CA-09.
    discussion: |-
      Organizations can isolate system components that perform different mission or business functions. Such isolation limits unauthorized information flows among system components and provides the opportunity to deploy greater levels of protection for selected system components.
