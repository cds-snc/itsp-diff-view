    sourceId: "SC-16 (01)"
    family: "SC"
    type: "enhancement"
    title: "Transmission of security and privacy attributes: Integrity verification"
    text: |-
      Verify the integrity of transmitted security and privacy attributes.
      Discussion: Part of verifying the integrity of transmitted information is ensuring that security and privacy attributes that are associated with such information have not been modified in an unauthorized manner. Unauthorized modification of security or privacy attributes can result in a loss of integrity for transmitted information.
      Related controls and activities: AU-10, SC-08.
    discussion: |-
      Part of verifying the integrity of transmitted information is ensuring that security and privacy attributes that are associated with such information have not been modified in an unauthorized manner. Unauthorized modification of security or privacy attributes can result in a loss of integrity for transmitted information.
