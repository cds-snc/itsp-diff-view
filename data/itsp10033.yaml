  - canonicalId: "SA-03.02"
    displayId: "SA-03 (02)"
    sourceId: "SA-03 (02)"
    family: "SA"
    type: "enhancement"
    title: "System development lifecycle: Use of live or operational data"
    text: |-
      Approve, document, and control the use of live data in pre-production environments for the system, system component, or system service
      Protect pre-production environments for the system, system component, or system service at the same impact or classification level as any live data in use within the pre-production environments
      Discussion: Live data is also referred to as operational data. The use of live or operational data in pre-production (i.e., development, test, and integration) environments can result in significant risks to organizations. In addition, the use of live data that is personal information in testing, research, and training increases the risk of unauthorized disclosure or misuse of such information. Therefore, it is important for the organization to manage any additional risks that may result from the use of live or operational data.
      Organizations can minimize such risks by using test or dummy data during the design, development, and testing of systems, system components, and system services. Risk assessment techniques may be used to determine if the risk of using live or operational data is acceptable. The use of personal information for testing requires that individuals are informed about the use in advance.
      GC discussion: When using personal information in testing activities, organizations may rely on testing as a consistent use of the information, in accordance with 8(2)(a) of the Privacy Act . For this to be acceptable, individuals must have been given notice about the use of their information for testing, at the point that the personal information was collected and, where appropriate, the associated PIBs need to reflect the use of the information for testing purposes. If individuals were not provided with notice at the point of collection, or if the use of the information for testing purposes is not listed as a consistent use in the associated PIB , program officials should contact their privacy officials for advice about whether this would be considered a consistent use or a secondary use.
      Related controls and activities: PM-25, RA-03.
    discussion: |-
      Live data is also referred to as operational data. The use of live or operational data in pre-production (i.e., development, test, and integration) environments can result in significant risks to organizations. In addition, the use of live data that is personal information in testing, research, and training increases the risk of unauthorized disclosure or misuse of such information. Therefore, it is important for the organization to manage any additional risks that may result from the use of live or operational data.
      Organizations can minimize such risks by using test or dummy data during the design, development, and testing of systems, system components, and system services. Risk assessment techniques may be used to determine if the risk of using live or operational data is acceptable. The use of personal information for testing requires that individuals are informed about the use in advance.
