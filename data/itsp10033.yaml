    text: |-
      Provide audit record generation capability for the event types the system is capable of auditing as defined in AU-02A on [Assignment: organization-defined system components]
      Allow [Assignment: organization-defined personnel or roles] to select the event types that are to be logged by specific components of the system
      Generate audit records for the event types defined in AU-02C that include the audit record content defined in AU-03
    discussion: |-
      Audit records can be generated from many different system components. The event types specified in AU-02D are the event types for which audit logs are to be generated and are a subset of all event types for which the system can generate audit records. If records generated for the audit process contain personal information that is not required for the audit process, that personal information should be removed or redacted.
