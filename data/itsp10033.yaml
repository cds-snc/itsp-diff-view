    type: "enhancement"
    title: "Developer testing and evaluation: Threat modelling and vulnerability analyses"
    text: |-
      Require the developer of the system, system component, or system service to perform threat modelling and vulnerability analyses during the development and the subsequent testing and evaluation of the system, component, or service that:
      uses the following contextual information: [Assignment: organization-defined information concerning impact, environment of operations, known or assumed threats, and acceptable risk levels]
      employs the following tools and methods: [Assignment: organization-defined tools and methods]
      conducts the modelling and analyses at the following level of rigour: [Assignment: organization-defined breadth and depth of modelling and analyses]
      produces evidence that meets the following acceptance criteria: [Assignment: organization-defined acceptance criteria]
      Discussion: Systems, system components, and system services may deviate significantly from the functional and design specifications created during the requirements and design stages of the system development lifecycle. Therefore, updates to threat modelling and vulnerability analyses of those systems, system components, and system services during development and prior to delivery are critical to the effective operation of those systems, components, and services. Threat modelling and vulnerability analyses at this stage of the system development lifecycle ensure that design and implementation changes have been accounted for and that vulnerabilities created because of those changes have been reviewed and mitigated.
      Related controls and activities: PM-15, RA-03, RA-05.
