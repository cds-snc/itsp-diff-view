    family: "SA"
    type: "enhancement"
    title: "Development process, standards, and tools: Criticality analysis"
    text: |-
      Require the developer of the system, system component, or system service to perform a criticality analysis:
      at the following decision points in the system development lifecycle: [Assignment: organization-defined decision points in the system development lifecycle]
      at the following level of rigour: [Assignment: organization-defined breadth and depth of criticality analysis]
      Discussion: Criticality analysis performed by the developer provides input to the criticality analysis performed by organizations. Developer input is essential to organizational criticality analysis because organizations may not have access to detailed design documentation for system components that are developed as COTS products. Such design documentation includes functional specifications, high-level designs, low-level designs, source code, and hardware schematics.
      Criticality analysis is important for organizational systems that are designated as high-value assets. High-value assets can be moderate- or high-impact systems due to heightened adversarial interest or potential adverse effects on the federal enterprise. Developer input is especially important when organizations conduct supply chain criticality analyses.
      Related controls and activities: RA-09.
    discussion: |-
      Criticality analysis performed by the developer provides input to the criticality analysis performed by organizations. Developer input is essential to organizational criticality analysis because organizations may not have access to detailed design documentation for system components that are developed as COTS products. Such design documentation includes functional specifications, high-level designs, low-level designs, source code, and hardware schematics.
