  - canonicalId: "SC-03"
    displayId: "SC-03"
    sourceId: "SC-03"
    family: "SC"
    type: "control"
    title: "Security function isolation"
    text: "Isolate security functions from non-security functions."
    discussion: |-
      Security functions are isolated from non-security functions by means of an isolation boundary implemented within a system via partitions and domains. The isolation boundary controls access to, and protects the integrity of, the hardware, software, and firmware that perform system security functions.
      Systems implement code separation in many ways, such as through the provision of security kernels via processor rings or processor modes. For non-kernel code, security function isolation is often achieved through file system protections that protect the code on disk and address space protections that protect executing code.
      Systems can restrict access to security functions using access control mechanisms and by implementing least-privilege capabilities. Ideally, all code within the defined security function isolation boundary should only contain security-relevant code; however, it is sometimes necessary to include non-security functions as an exception.
      The isolation of security functions from non-security functions can be achieved by applying the systems security engineering design principles in SA-08, including SA-08(01), SA-08(03), SA-08(04), SA-08(10), SA-08(12), SA-08(13), SA-08(14), and SA-08(18).
