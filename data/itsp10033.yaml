    type: "enhancement"
    title: "Sensor capability and data: Reporting to authorized individuals or roles"
    text: |-
      Verify that the system is configured so that data or information collected by the [Assignment: organization-defined sensors] is only reported to authorized individuals or roles.
      Discussion: In situations where sensors are activated by authorized individuals, it is still possible that the data or information collected by the sensors will be sent to unauthorized entities. Organizations should make sure appropriate controls are in place to ensure sensor data is protected.
      Related controls and activities: None.
