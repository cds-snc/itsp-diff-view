    displayId: "SA-08 (22)"
    sourceId: "SA-08 (22)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Accountability and traceability"
    text: |-
      Implement the security design principle of accountability and traceability in [Assignment: organization-defined systems or system components].
      Discussion: The principle of accountability and traceability states that it is possible to trace security-relevant actions (i.e., subject-object interactions) to the entity on whose behalf the action is being taken. The principle of accountability and traceability requires a trustworthy infrastructure that can record details about actions that affect system security (e.g., an audit subsystem).
      To record the details about actions, the system is able to uniquely identify the entity on whose behalf the action is being carried out and also record the relevant sequence of actions that is carried out. The accountability policy also requires that the audit trail itself be protected from unauthorized access and modification.
      The principle of least privilege assists in tracing the actions to particular entities, as it increases the granularity of accountability. Associating specific actions with system entities, and ultimately with users, and making the audit trail secure against unauthorized access and modifications provide non-repudiation because once an action is recorded, it is not possible to change the audit trail.
      Another important function that accountability and traceability serves is in the routine and forensic analysis of events associated with the violation of security policy. Analysis of audit logs may provide additional information that may be helpful in determining the path or component that allowed the violation of the security policy and the actions of individuals associated with the violation of the security policy.
      Related controls and activities: AC-06, AU-02, AU-03, AU-06, AU-09, AU-10, AU-12, IA-02, IR-04.
