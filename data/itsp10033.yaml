    title: |-
      Communication of key privacy services: Privacy policies on websites, applications, and digital services
    text: |-
      Develop and post privacy policies on all external-facing websites, mobile applications, and other digital services, if the privacy of websites visitors could be affected. Ensure that policies:
      are written in plain language and organized in a way that is easy to understand and navigate
      provide information needed by the public to make an informed decision about whether and how to interact with the organization
      are updated whenever the organization makes a substantive change to the practices it describes and includes a time/date stamp to inform the public of the date of the most recent changes
      Discussion: Organizations post privacy policies on all external-facing websites, mobile applications, and other digital services if the privacy of website visitors could be affected. Organizations post a link to the relevant privacy policy on any known, major entry points to the website, application, or digital service. Organizations may be subject to applicable laws, directives, regulations, or policies that require the provision of specific information to the public. Organizational personnel consult with the appropriate privacy senior official or executive and legal counsel regarding such requirements.
      Related controls and activities: None.
    discussion: |-
      Organizations post privacy policies on all external-facing websites, mobile applications, and other digital services if the privacy of website visitors could be affected. Organizations post a link to the relevant privacy policy on any known, major entry points to the website, application, or digital service. Organizations may be subject to applicable laws, directives, regulations, or policies that require the provision of specific information to the public. Organizational personnel consult with the appropriate privacy senior official or executive and legal counsel regarding such requirements.
