    title: "Boundary protection: Separate subnets to isolate functions"
    text: |-
      Implement [Selection (1): physically; logically] separate subnetworks to isolate the following critical system components and functions: [Assignment: organization-defined critical system components and functions].
      Discussion: Separating critical system components and functions from other non-critical system components and functions through separate subnetworks may be necessary to reduce susceptibility to a catastrophic or debilitating breach or compromise that results in system failure. For example, physically separating the command-and-control function from the in-flight entertainment function through separate subnetworks in a commercial aircraft provides an increased level of assurance in both the trustworthiness and robustness of critical system functions.
