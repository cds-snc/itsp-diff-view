  - canonicalId: "RA-02"
    displayId: "RA-02"
    sourceId: "RA-02"
    family: "RA"
    type: "activity"
    title: "Security categorization"
    text: |-
      Categorize the system and information it processes, stores, and transmits
      Document the security categorization results, including supporting rationale, in the security plan for the system
      Verify that the authorizing official or authorizing official’s designated representative reviews and approves the security categorization decision
    discussion: |-
      Security categories describe the potential adverse impacts or negative consequences to organizational operations, organizational assets, and individuals if organizational information and systems are compromised through a loss of confidentiality, integrity, or availability. Security categorization is also a type of asset loss characterization in systems security engineering processes that is carried out throughout the system development lifecycle. Organizations can use privacy risk assessments or PIA s to better understand the potential adverse effects on individuals.
      Security categorization processes facilitate the development of inventories of information assets and, along with CM-08, mappings to specific system components where information is handled, stored, or transmitted. The security categorization process is revisited throughout the system development lifecycle to ensure that the security categories remain accurate and relevant. Organizational cyber security and privacy risk management activities (ITSP.10.036) provides guidance on security categorization.
