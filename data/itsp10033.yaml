  - canonicalId: "CP-02.07"
    displayId: "CP-02 (07)"
    sourceId: "CP-02 (07)"
    family: "CP"
    type: "enhancement"
    title: "Contingency plan: Coordinate with external service providers"
    text: |-
      Coordinate the contingency plan with the contingency plans of external service providers to ensure that contingency requirements can be satisfied.
      Discussion: When the capability of an organization to carry out its mission and business functions is dependent on external service providers, developing a comprehensive and timely contingency plan may become more challenging. When mission and business functions are dependent on external service providers, organizations coordinate contingency planning activities with the external entities to ensure that the individual plans reflect the overall contingency needs of the organization. Ensure contract vehicles include clauses that require the external service provider(s) to notify and collaborate with the organization in the event that a system holding personal information is compromised.
      Related controls and activities: SA-09.
