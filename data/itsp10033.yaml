  - canonicalId: "SC-03.04"
    displayId: "SC-03 (04)"
    sourceId: "SC-03 (04)"
    family: "SC"
    type: "enhancement"
    title: "Security function isolation: Module coupling and cohesiveness"
    text: |-
      Implement security functions as largely independent modules that maximize internal cohesiveness within modules and minimize coupling between modules.
      Discussion: Reducing inter-module interactions helps constrain security functions and manage complexity. The concepts of coupling and cohesiveness are important with respect to modularity in software design. Coupling refers to the dependencies that one module has on other modules. Cohesiveness refers to the relationship between functions within a module. Best practices in software engineering and systems security engineering rely on layering, minimization, and modular decomposition to reduce and manage complexity. This produces software modules that are highly cohesive and loosely coupled.
      Related controls and activities: None.
