  - canonicalId: "SA-08.13"
    displayId: "SA-08 (13)"
    sourceId: "SA-08 (13)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Minimized security elements"
    text: |-
      Implement the security design principle of minimized security elements in [Assignment: organization-defined systems or system components].
      Discussion: The principle of minimized security elements states that the system does not have extraneous trusted components. The principle of minimized security elements has 2 aspects: the overall cost of security analysis and the complexity of security analysis.
      Trusted components are generally costlier to construct and implement, owing to the increased rigour of development processes and supply chain integrity requirements. Trusted components require greater security analysis to qualify their robustness and enhance supply chain controls to qualify their trustworthiness. Thus, to reduce the cost and decrease the complexity of the security analysis, a system contains as few trusted components as possible.
      The analysis of the interaction of trusted components with other components of the system is one of the most important aspects of system security verification. If the interactions between components are unnecessarily complex, the security of the system will also be more difficult to ascertain than one whose internal trust relationships are simple and elegantly constructed. In general, fewer trusted components result in fewer internal trust relationships and a simpler system.
      Related controls and activities: None.
