    type: "enhancement"
    title: "Acquisition process: System of record"
    text: |-
      Include [Assignment: organization-defined Privacy Act requirements] in the acquisition contract for the operation of a system of record on behalf of an organization to accomplish an organizational mission or function.
      Discussion: When, by contract, an organization provides for the operation of a system of record to accomplish an organizational mission or function, the organization, consistent with its authority, causes the requirements of the Privacy Act to be applied to the system of records.
      At times, contractors will represent the GC and collect personal information associated with operating programs or services. Contractors must be transparent that they are representing the GC and inform individuals about how their personal information may be shared with the government. When contractors are representing the GC , privacy and security obligations apply. Clarify in the acquisition contract custodial rights to personal information, in the event that the contractor will be representing the GC and collecting personal information from individuals.
      Related controls and activities: PT-06.
