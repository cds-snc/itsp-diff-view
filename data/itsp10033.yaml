  - canonicalId: "SC-46.400"
    displayId: "SC-46 (400)"
    sourceId: "SC-46 (400)"
    family: "SC"
    type: "enhancement"
    title: "Cross-domain policy enforcement: Manual data transfer"
    text: |-
      Limit the use of manual data transfer.
      Discussion: A transfer CDS allows information to be transferred securely and automatically between different security domains. The use of manual data transfer should be limited to specific requirements. Circumventing the proper transfer procedures and choosing to transfer information using removable media is generally inappropriate user behaviour.
      If transferring information using removable media becomes an operational necessity, procedures must conform with the Cyber Centre’s ITSB-112. An authorized user may do a manual data transfer using removable media such as a USB memory stick. If available, an offline CDS can be used to scan and sanitize the media. Such a transfer can be used when there is a requirement to transfer a software patch or anti-virus update from a removable media device to an isolated security domain, for example.
      Related controls and activities: None.
    discussion: |-
      A transfer CDS allows information to be transferred securely and automatically between different security domains. The use of manual data transfer should be limited to specific requirements. Circumventing the proper transfer procedures and choosing to transfer information using removable media is generally inappropriate user behaviour.
