  - canonicalId: "SC-22"
    displayId: "SC-22"
    sourceId: "SC-22"
    family: "SC"
    type: "control"
    title: "Architecture and provisioning for name/address resolution service"
    text: |-
      Ensure the systems that collectively provide name/address resolution service for an organization are fault-tolerant and implement internal and external role separation.
    discussion: |-
      Systems that provide name and address resolution services include DNS servers. To eliminate single points of failure in systems and enhance redundancy, organizations employ at least 2 authoritative DNS servers — one configured as the primary server and the other configured as the secondary server. Additionally, organizations typically deploy the servers in 2 geographically separated network subnetworks (i.e., not located in the same physical facility).
      For role separation, DNS servers with internal roles only process name and address resolution requests from within organizations (i.e., from internal clients). DNS servers with external roles only process name and address resolution information requests from clients external to organizations (i.e., on external networks, including the Internet). Organizations specify clients that can access authoritative DNS servers in certain roles (e.g., by address ranges and explicit lists).
