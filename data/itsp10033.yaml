    title: "Boundary protection: Route traffic to authenticated proxy servers"
    text: |-
      Route [Assignment: organization-defined internal communications traffic] to [Assignment: organization-defined external networks] through authenticated proxy servers at managed interfaces.
      Discussion: External networks are networks outside of organizational control. A proxy server is a server (i.e., system or application) that acts as an intermediary for clients requesting system resources from non-organizational or other organizational servers. System resources that may be requested include files, connections, web pages, or services.
      Client requests established through a connection to a proxy server are assessed to manage complexity and provide additional protection by limiting direct connectivity. Web content filtering devices are one of the most common proxy servers that provide access to the Internet.
      Proxy servers can support the logging of Transmission Control Protocol (TCP) sessions and the blocking of specific URLs, IP addresses, and domain names. Web proxies can be configured with organization-defined lists of authorized and unauthorized websites. Note that proxy servers may inhibit the use of VPN s and create the potential for adversary-in-the-middle attacks (depending on the implementation).
      Related controls and activities: AC-03.
