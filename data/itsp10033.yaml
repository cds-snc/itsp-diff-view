    type: "control"
    title: "Personal information quality operations"
    text: |-
      Ensure the accuracy, relevance, timeliness, and completeness of personal information used for an administrative purpose by the organization across the information lifecycle [Assignment: organization-defined frequency]
      Correct or delete inaccurate or outdated personal information
    discussion: |-
      Personal information quality operations include the steps that organizations take to confirm the accuracy and relevance of personal information throughout the information lifecycle. The information lifecycle includes the creation, collection, use, handling, storage, maintenance, dissemination, disclosure, and disposal of personal information. Personal information quality operations include editing and validating addresses as they are collected or entered into systems using automated address verification look-up API s.
      Checking personal information quality includes the tracking of updates or changes to data over time, which enables organizations to know how and what personal information was changed should erroneous information be identified. The measures taken to protect personal information quality are based on the nature and context of the personal information, how it is to be used, how it was obtained, and the potential de-identification methods employed.
