  - canonicalId: "SA-08.04"
    displayId: "SA-08 (04)"
    sourceId: "SA-08 (04)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Partially ordered dependencies"
    text: |-
      Implement the security design principle of partially ordered dependencies in [Assignment: organization-defined systems or system components].
      Discussion: The principle of partially ordered dependencies states that the synchronization, calling, and other dependencies in the system are partially ordered. A fundamental concept in system design is layering, whereby the system is organized into well-defined, functionally related modules or components. The layers are linearly ordered with respect to inter-layer dependencies, such that higher layers are dependent on lower layers.
      While providing functionality to higher layers, some layers can be self-contained and are not dependent on lower layers. Although a partial ordering of all functions in a given system may not be possible, if circular dependencies are constrained to occur within layers, the inherent problems of circularity can be more easily managed.
      Partially ordered dependencies and system layering contribute significantly to the simplicity and coherency of the system design. Partially ordered dependencies also facilitate system testing and analysis.
      Related controls and activities: None.
