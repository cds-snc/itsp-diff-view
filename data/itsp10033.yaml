  - canonicalId: "IA-05.01"
    displayId: "IA-05 (01)"
    sourceId: "IA-05 (01)"
    family: "IA"
    type: "enhancement"
    title: "Authenticator management: Password-based authentication"
    text: |-
      For password-based authentication:
      maintain a list of commonly used, expected, or compromised passwords and update the list [Assignment: organization-defined frequency] and when organizational passwords are suspected to have been compromised directly or indirectly
      when users create or update passwords, verify that the passwords are not found on the list of commonly used, expected, or compromised passwords in IA-05(01)a
      transmit passwords only over cryptographically protected channels
      store passwords using an approved salted key derivation function, preferably using a keyed hash
      require immediate selection of a new password upon account recovery
      allow user selection of long passwords and passphrases, including spaces and all printable characters
      employ automated tools to assist the user in selecting strong password authenticators
      enforce the following composition and complexity rules: [Assignment: organization-defined composition and complexity rules]
      Discussion: Password-based authentication applies to passwords regardless of whether they are used in single-factor or multi-factor authentication. Long passwords or passphrases are preferable over shorter passwords. Enforced composition rules provide marginal security benefits while decreasing usability. However, organizations may choose to establish certain rules for password generation (e.g., minimum character length for long passwords) under certain circumstances and can enforce this requirement in IA-05(01)h.
      Account recovery can occur, for example, in situations when a password is forgotten. Cryptographically protected passwords include salted one-way cryptographic hashes of passwords. The list of commonly used, compromised, or expected passwords includes passwords obtained from previous breach corpuses, dictionary words, and repetitive or sequential characters. The list includes context-specific words, such as the name of the service, username, and derivatives thereof.
      Recovery questions often require users to provide personal information. Consideration of the privacy concept of necessity versus proportionality requires that organizations collect just enough personal information required to ensure accurate authentication. The use of pre-registered knowledge tokens is not recommended for account recovery.
      Related controls and activities: IA-06.
    discussion: |-
      Password-based authentication applies to passwords regardless of whether they are used in single-factor or multi-factor authentication. Long passwords or passphrases are preferable over shorter passwords. Enforced composition rules provide marginal security benefits while decreasing usability. However, organizations may choose to establish certain rules for password generation (e.g., minimum character length for long passwords) under certain circumstances and can enforce this requirement in IA-05(01)h.
      Account recovery can occur, for example, in situations when a password is forgotten. Cryptographically protected passwords include salted one-way cryptographic hashes of passwords. The list of commonly used, compromised, or expected passwords includes passwords obtained from previous breach corpuses, dictionary words, and repetitive or sequential characters. The list includes context-specific words, such as the name of the service, username, and derivatives thereof.
