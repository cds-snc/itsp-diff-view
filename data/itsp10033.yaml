    displayId: "SA-08 (11)"
    sourceId: "SA-08 (11)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Inverse modification threshold"
    text: |-
      Implement the security design principle of inverse modification threshold in [Assignment: organization-defined systems or system components].
      Discussion: The principle of inverse modification threshold builds on the principles of trusted components and of hierarchical trust and states that the degree of protection provided to a component is commensurate with its trustworthiness. As the trust placed in a component increases, the protection against unauthorized modification of the component increases to the same degree.
      Protection from unauthorized modification can come in the form of the component’s own self-protection and innate robustness, or it can come from the protections afforded to the component from other elements or attributes of the security architecture (to include protections in the environment of operation).
      Related controls and activities: None.
