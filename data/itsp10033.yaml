  - canonicalId: "SC-02"
    displayId: "SC-02"
    sourceId: "SC-02"
    family: "SC"
    type: "control"
    title: "Separation of system and user functionality"
    text: |-
      Separate user functionality, including user interface services, from system management functionality.
    discussion: |-
      System management functionality includes functions that are necessary to administer databases, network components, workstations, or servers. These functions typically require privileged user access. User functions are separated from system management functions physically or logically.
      Organizations may separate system management functions from user functions by using different computers, instances of operating systems, central processing units, or network addresses; by employing virtualization techniques; or through some combination of these or other methods.
      The separation of system management functions from user functions includes web administrative interfaces that employ separate authentication methods for users of any other system resources. The separation of system and user functions may include isolating administrative interfaces on different domains and with additional access controls. The separation of system and user functionality can be achieved by applying the systems security engineering design principles in SA-08, including SA-08(01), SA-08(03), SA-08(04), SA-08(10), SA-08(12), SA-08(13), SA-08(14), and SA-08(18).
