    family: "SA"
    type: "enhancement"
    title: "System development lifecycle: Technology refresh"
    text: |-
      Plan for and implement a technology refresh schedule for the system throughout the system development lifecycle.
      Discussion: Technology refresh planning may encompass hardware, software, firmware, processes, personnel skill sets, suppliers, service providers, and facilities. The use of obsolete or nearing obsolete technology may increase the security and privacy risks associated with unsupported components, counterfeit or repurposed components, components unable to implement security or privacy requirements, slow or inoperable components, components from untrusted sources, inadvertent personnel error, or increased complexity. Technology refreshes typically occur during the operations and maintenance stage of the system development lifecycle.
      Related controls and activities: MA-06.
