  - canonicalId: "SA-08.31"
    displayId: "SA-08 (31)"
    sourceId: "SA-08 (31)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Secure system modification"
    text: |-
      Implement the security design principle of secure system modification in [Assignment: organization-defined systems or system components].
      Discussion: The principle of secure system modification states that system modification maintains system security with respect to the security requirements and risk tolerance of stakeholders. Upgrades or modifications to systems can transform secure systems into systems that are not secure. The procedures for system modification ensure that if the system is to maintain its trustworthiness and robustness, the same rigour that was applied to its initial development is applied to any system changes. Because modifications can affect the ability of the system to maintain its secure state, a careful security analysis of the modification is needed prior to its implementation and deployment. This principle parallels the principle of secure evolvability.
      Related controls and activities: CM-03, CM-04.
    discussion: |-
      The principle of secure system modification states that system modification maintains system security with respect to the security requirements and risk tolerance of stakeholders. Upgrades or modifications to systems can transform secure systems into systems that are not secure. The procedures for system modification ensure that if the system is to maintain its trustworthiness and robustness, the same rigour that was applied to its initial development is applied to any system changes. Because modifications can affect the ability of the system to maintain its secure state, a careful security analysis of the modification is needed prior to its implementation and deployment. This principle parallels the principle of secure evolvability.
