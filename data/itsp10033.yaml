  - canonicalId: "IA-05.18"
    displayId: "IA-05 (18)"
    sourceId: "IA-05 (18)"
    family: "IA"
    type: "enhancement"
    title: "Authenticator management: Password managers"
    text: |-
      Employ [Assignment: organization-defined password managers] to generate and manage passwords
      Protect the passwords using [Assignment: organization-defined controls]
      Discussion: For systems where static passwords are employed, it is often a challenge to ensure that the passwords are suitably complex and that the same passwords are not employed on multiple systems. A password manager is a solution to this problem as it automatically generates and stores strong and different passwords for various accounts. A potential risk of using password managers is that adversaries can target the collection of passwords generated by the password manager. Therefore, the collection of passwords requires protection including encrypting the passwords (see IA-05(01)d) and storing the collection offline in a token.
      Related controls and activities: None.
    discussion: |-
      For systems where static passwords are employed, it is often a challenge to ensure that the passwords are suitably complex and that the same passwords are not employed on multiple systems. A password manager is a solution to this problem as it automatically generates and stores strong and different passwords for various accounts. A potential risk of using password managers is that adversaries can target the collection of passwords generated by the password manager. Therefore, the collection of passwords requires protection including encrypting the passwords (see IA-05(01)d) and storing the collection offline in a token.
