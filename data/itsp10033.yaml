  - canonicalId: "IA-05.17"
    displayId: "IA-05 (17)"
    sourceId: "IA-05 (17)"
    family: "IA"
    type: "enhancement"
    title: "Authenticator management: Presentation attack detection for biometric authenticators"
    text: |-
      Employ presentation attack detection mechanisms for biometric-based authentication.
      Discussion: Biometric characteristics do not constitute authentication secrets. Such characteristics can be obtained by online web accesses, taking a picture of someone with a camera phone to obtain facial images with or without their knowledge, lifting from objects that someone has touched (e.g., a latent fingerprint), or capturing a high-resolution image (e.g., an iris pattern). Presentation attack detection technologies, including liveness detection, can mitigate the risk of these types of attacks by making it difficult to produce artifacts intended to defeat the biometric sensor.
      Related controls and activities: AC-07.
    discussion: |-
      Biometric characteristics do not constitute authentication secrets. Such characteristics can be obtained by online web accesses, taking a picture of someone with a camera phone to obtain facial images with or without their knowledge, lifting from objects that someone has touched (e.g., a latent fingerprint), or capturing a high-resolution image (e.g., an iris pattern). Presentation attack detection technologies, including liveness detection, can mitigate the risk of these types of attacks by making it difficult to produce artifacts intended to defeat the biometric sensor.
