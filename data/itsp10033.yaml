  - canonicalId: "SA-15.01"
    displayId: "SA-15 (01)"
    sourceId: "SA-15 (01)"
    family: "SA"
    type: "enhancement"
    title: "Development process, standards, and tools: Quality metrics"
    text: |-
      Require the developer of the system, system component, or system service to:
      define quality metrics at the beginning of the development process
      provide evidence of meeting the quality metrics [Selection (1 or more): [Assignment: organization-defined frequency]; [Assignment: organization-defined program review milestones]; upon delivery]
      Discussion: Organizations use quality metrics to establish acceptable levels of system quality. Metrics can include quality gates, which are collections of completion criteria or sufficiency standards that represent the satisfactory execution of specific phases of the system development project. For example, a quality gate may require the elimination of all compiler warnings or a determination that such warnings have no impact on the effectiveness of required security or privacy capabilities. During the execution phases of development projects, quality gates provide clear, unambiguous indications of progress. Other metrics apply to the entire development project. Metrics can include defining the severity thresholds of vulnerabilities in accordance with organizational risk tolerance, such as requiring no known vulnerabilities in the delivered system with a CVSS severity of medium or high.
      Related controls and activities: None.
    discussion: |-
      Organizations use quality metrics to establish acceptable levels of system quality. Metrics can include quality gates, which are collections of completion criteria or sufficiency standards that represent the satisfactory execution of specific phases of the system development project. For example, a quality gate may require the elimination of all compiler warnings or a determination that such warnings have no impact on the effectiveness of required security or privacy capabilities. During the execution phases of development projects, quality gates provide clear, unambiguous indications of progress. Other metrics apply to the entire development project. Metrics can include defining the severity thresholds of vulnerabilities in accordance with organizational risk tolerance, such as requiring no known vulnerabilities in the delivered system with a CVSS severity of medium or high.
