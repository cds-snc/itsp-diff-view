  - canonicalId: "SA-10"
    displayId: "SA-10"
    sourceId: "SA-10"
    family: "SA"
    type: "control"
    title: "Developer configuration management"
    discussion: |-
      Organizations consider the quality and completeness of configuration management activities conducted by developers as direct evidence that effective security controls have been applied. Controls include protecting the master copies of material used to generate security-relevant portions of the system hardware, software, and firmware from unauthorized modification or destruction. Maintaining the integrity of changes to the system, system component, or system service requires strict configuration control throughout the system development lifecycle to track authorized changes and prevent unauthorized changes.
      The configuration items that are placed under configuration management include the formal model; the functional, high-level, and low-level design specifications; other design data; implementation documentation; source code and hardware schematics; the current running version of the object code; tools for comparing new versions of security-relevant hardware descriptions and source code with previous versions; and test fixtures and documentation.
      Depending on the mission and business needs of organizations and the nature of the contractual relationships in place, developers may provide configuration management support during the operations and maintenance stage of the system development lifecycle.
