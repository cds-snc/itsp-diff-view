      Reducing inter-module interactions helps constrain security functions and manage complexity. The concepts of coupling and cohesiveness are important with respect to modularity in software design. Coupling refers to the dependencies that one module has on other modules. Cohesiveness refers to the relationship between functions within a module. Best practices in software engineering and systems security engineering rely on layering, minimization, and modular decomposition to reduce and manage complexity. This produces software modules that are highly cohesive and loosely coupled.
