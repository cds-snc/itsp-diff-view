  - canonicalId: "CP-02"
    displayId: "CP-02"
    sourceId: "CP-02"
    family: "CP"
    type: "control"
    title: "Contingency plan"
    text: |-
      Develop a contingency plan for the system that
      identifies essential mission and business functions and associated contingency requirements
      provides recovery objectives, restoration priorities, and metrics
      addresses contingency roles, responsibilities, and assigned individuals with contact information
      addresses maintaining essential mission and business functions despite a system disruption, compromise, or failure
      addresses eventual, full system restoration without deterioration of the controls originally planned and implemented
      addresses the integrity of the data held within the system, including personal information
      addresses the impact, injury, or consequence of a system compromise, including with respect to personal information
      addresses the sharing of contingency information
      is reviewed and approved by [Assignment: organization-defined personnel or roles]
      Distribute copies of the contingency plan to [Assignment: organization-defined key contingency personnel (identified by name and/or by role) and organizational elements]
      Ensure individuals with responsibilities review the contingency plan and understand their roles
      Coordinate contingency planning activities with incident handling activities
      Review the contingency plan for the system [Assignment: organization-defined frequency]
      Update the contingency plan to address changes to the organization, system, or environment of operation and problems encountered during contingency plan implementation, execution, or testing
      Communicate contingency plan changes to [Assignment: organization-defined key contingency personnel (identified by name and/or by role) and organizational elements]
      Incorporate lessons learned from contingency plan testing, training, or actual contingency activities into contingency testing and training
      Protect the contingency plan from unauthorized disclosure and modification
    discussion: |-
      Contingency planning for systems is part of an overall program for achieving continuity of operations for organizational mission and business functions. Contingency planning addresses system restoration and implementation of alternative mission or business processes when systems are compromised or breached. Contingency planning is considered throughout the system development lifecycle and is a fundamental part of the system design.
      Systems can be designed for redundancy, to provide backup capabilities, and for resilience. Contingency plans reflect the degree of restoration required for organizational systems since not all systems need to fully recover to achieve the level of continuity of operations desired. System recovery objectives reflect applicable laws, Orders in Council, directives, regulations, jurisprudence, policies, standards, guidelines, organizational risk tolerance, and system impact level.
      Actions addressed in contingency plans include orderly system degradation, system shutdown, fallback to a manual mode, alternate information flows, and operating in modes reserved for when systems are under attack. By coordinating contingency planning with incident handling activities, organizations ensure that the necessary planning activities are in place and activated in the event of an incident. Organizations should consider whether continuity of operations during an incident conflicts with the capability to automatically disable the system, as specified in IR-04(05). Incident response planning is part of contingency planning for organizations and is addressed in the IR (incident response) family.
