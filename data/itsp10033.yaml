  - canonicalId: "SA-01"
    displayId: "SA-01"
    sourceId: "SA-01"
    family: "SA"
    type: "activity"
    title: "System and services acquisition policy and procedures"
    text: |-
      Develop, document, and disseminate to [Assignment: organization-defined personnel or roles]
      [Selection (1 or more): Organization-level; Mission/business process-level; System-level] system and services acquisition policy that
      addresses purpose, scope, roles, responsibilities, management commitment, coordination among organizational entities, and compliance
      is consistent with applicable laws, Orders in Council, directives, regulations, policies, standards, and guidelines
      procedures to facilitate the implementation of the system and services acquisition policy and the associated system and services acquisition controls
      Designate an [Assignment: organization-defined official] to manage the development, documentation, and dissemination of the system and services acquisition policy and procedures
      Review and update the current system and services acquisition
      policy [Assignment: organization-defined frequency] and following [Assignment: organization-defined events]
      procedures [Assignment: organization-defined frequency] and following [Assignment: organization-defined events]
    discussion: |-
      System and services acquisition policy and procedures address the controls in the SA family that are implemented within systems and organizations. The risk management strategy is an important factor in establishing such policies and procedures. Policies and procedures contribute to security and privacy assurance. Therefore, it is important that security and privacy programs collaborate on the development of system and services acquisition policy and procedures.
      In general, security and privacy program policies and procedures at the organization level are preferable and may remove the need for mission- or system-specific policies and procedures. The policy can be included as part of the general security and privacy policy or be represented by multiple policies that reflect the complex nature of organizations.
      Procedures can be established for security and privacy programs, for mission or business processes, and for systems, if needed. Procedures describe how the policies or controls are implemented and can be directed at the individual or role that is the object of the procedure. Procedures can be documented in system security and privacy plans or in one or more separate documents.
      Events that may precipitate an update to system and services acquisition policy and procedures include assessment or audit findings, security incidents or breaches, or changes in laws, Orders in Council, directives, regulations, policies, standards, and guidelines. Simply restating controls does not constitute an organizational policy or procedure.
