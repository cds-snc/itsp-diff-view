  - canonicalId: "SC-34"
    displayId: "SC-34"
    sourceId: "SC-34"
    family: "SC"
    type: "control"
    title: "Non-modifiable executable programs"
    text: |-
      For [Assignment: organization-defined system components], load and execute:
      the operating environment from hardware-enforced, read-only media
      the following applications from hardware-enforced, read-only media: [Assignment: organization-defined applications]
    discussion: |-
      The operating environment for a system contains the code that hosts applications, including operating systems, executives, or virtual machine monitors (i.e., hypervisors). It can also include certain applications that run directly on hardware platforms. Hardware-enforced, read-only media and write-once recordable media include Compact Disc-Recordable (CD-R) Digital Versatile Disc-Recordable (DVD-R), and Blu-Ray (BD-R) disk drives as well as one-time, programmable read-only memory (PROM). The use of non-modifiable storage ensures the integrity of software from the point of creation of the read-only image. The use of reprogrammable read-only memory can be accepted as read-only media provided that integrity can be adequately protected from the point of initial writing to the insertion of the memory into the system, and there are reliable hardware protections against reprogramming the memory while installed in organizational systems.
