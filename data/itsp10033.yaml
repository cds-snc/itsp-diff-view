    title: "External system services: Processing, storage, and service location"
    text: |-
      Restrict the location of [Selection (1 or more): information processing; information or data; system services] to [Assignment: organization-defined locations] based on [Assignment: organization-defined requirements or conditions].
      Discussion: The location of information processing, information and data storage, or system services can have a direct impact on the ability of organizations to successfully execute their mission and business functions. The impact occurs when external providers control the location of processing, storage, or services. The criteria that external providers use to select processing, storage, or service locations may be different from the criteria that organizations use.
      For example, organizations may want data or information storage locations to be restricted to certain locations to facilitate incident response activities in case of information security incidents or breaches. Incident response activities, including forensic analyses and after-the-fact investigations, may be adversely affected by the governing laws, policies, or protocols in the locations where processing and storage occur and/or the locations from which system services emanate.
      Related controls and activities: SA-05, SA-400, SR-04.
