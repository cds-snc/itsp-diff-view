  - canonicalId: "SA-08.09"
    displayId: "SA-08 (09)"
    sourceId: "SA-08 (09)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Trusted components"
    text: |-
      Implement the security design principle of trusted components in [Assignment: organization-defined systems or system components].
      Discussion: The principle of trusted components states that a component is both trustworthy and robust to at least a level commensurate with the security dependencies it supports (i.e., how much it is trusted to perform its security functions by other components). This principle enables the composition of components such that trustworthiness and robustness are not inadvertently diminished, and the trust is not consequently misplaced. Ultimately, this principle demands some metric by which the trust in a component and the trustworthiness and robustness of a component can be measured on the same abstract scale.
      The principle of trusted components is particularly relevant when considering systems and components in which there are complex chains of trust dependencies. A trust dependency is also referred to as a trust relationship and there may be chains of trust relationships.
      The principle of trusted components also applies to a compound component that consists of subcomponents (e.g., a subsystem), which may have varying levels of trustworthiness. The conservative assumption is that the trustworthiness of a compound component is that of its least trustworthy subcomponent. It may be possible to provide a security engineering rationale that the trustworthiness of a particular compound component is greater than the conservative assumption. However, any such rationale reflects logical reasoning based on a clear statement of the trustworthiness objectives as well as relevant and credible evidence. The trustworthiness of a compound component is not the same as increased application of defence-in-depth layering within the component or a replication of components. Defence-in-depth techniques do not increase the trustworthiness of the whole above that of the least trustworthy component.
      Related controls and activities: None.
    discussion: |-
      The principle of trusted components states that a component is both trustworthy and robust to at least a level commensurate with the security dependencies it supports (i.e., how much it is trusted to perform its security functions by other components). This principle enables the composition of components such that trustworthiness and robustness are not inadvertently diminished, and the trust is not consequently misplaced. Ultimately, this principle demands some metric by which the trust in a component and the trustworthiness and robustness of a component can be measured on the same abstract scale.
