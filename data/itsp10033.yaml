  - canonicalId: "SC-42"
    displayId: "SC-42"
    sourceId: "SC-42"
    family: "SC"
    type: "control"
    title: "Sensor capability and data"
    text: |-
      Prohibit [Selection (1 or more): the use of devices possessing [Assignment: organization-defined environmental sensing capabilities] in [Assignment: organization-defined facilities, areas, or systems]; the remote activation of environmental sensing capabilities on organizational systems or system components with the following exceptions: [Assignment: organization-defined exceptions where remote activation of sensors is allowed]]
      Provide an explicit indication of sensor use to [Assignment: organization-defined group of users]
    discussion: |-
      Sensor capability and data applies to types of systems or system components characterized as mobile devices, such as cellular telephones, smart phones, and tablets. Mobile devices often include sensors that can collect and record data regarding the environment where the system is in use. Sensors that are embedded within mobile devices include microphones, cameras, Global Positioning System (GPS) mechanisms, and accelerometers.
      While the sensors on mobiles devices provide an important function, such devices can potentially provide a means for adversaries to learn valuable information about individuals and organizations if activated covertly. For example, remotely activating the GPS function on a mobile device could provide an adversary with the ability to track the movements of an individual. Organizations may prohibit individuals from bringing cellular telephones or digital cameras into certain designated facilities or controlled areas within facilities where classified information is stored or sensitive conversations take place.
