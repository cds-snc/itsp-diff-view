  - canonicalId: "SA-08.29"
    displayId: "SA-08 (29)"
    sourceId: "SA-08 (29)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Repeatable and documented procedures"
    text: |-
      Implement the security design principle of repeatable and documented procedures in [Assignment: organization-defined systems or system components].
      Discussion: The principle of repeatable and documented procedures states that the techniques and methods employed to construct a system component permit the same component to be completely and correctly reconstructed at a later time. Repeatable and documented procedures support the development of a component that is identical to the component created earlier, which may be in widespread use.
      In the case of other system artifacts (e.g., documentation and testing results), repeatability supports consistency and the ability to inspect the artifacts. Repeatable and documented procedures can be introduced at various stages within the system development lifecycle and can contribute to the ability to evaluate assurance claims for the system. Examples include systematic procedures for code development and review, procedures for the configuration management of development tools and system artifacts, and procedures for system delivery.
      Related controls and activities: CM-01, SA-01, SA-10, SA-11, SA-15, SA-17, SC-01, SI-01.
