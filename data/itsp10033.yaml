    title: "Developer security and privacy architecture and design: Structure for testing"
    text: |-
      Require the developer of the system, system component, or system service to structure security-relevant hardware, software, and firmware to facilitate testing.
      Discussion: Applying the security design principles in NIST SP 800-160 Volume 1 Revision 1 and the development framework in System lifecycle cyber security and privacy risk management activities (ITSP.10.037) promote complete, consistent, and comprehensive testing and evaluation of systems, system components, and services. The thoroughness of such testing contributes to the evidence produced to generate an effective assurance case or argument as to the robustness of the system, system component, or service.
      Related controls and activities: SA-05, SA-11.
