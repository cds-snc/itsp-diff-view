  - canonicalId: "SA-03"
    displayId: "SA-03"
    sourceId: "SA-03"
    family: "SA"
    type: "activity"
    title: "System development lifecycle"
    text: |-
      Acquire, develop, and manage the system using [Assignment: organization-defined system development lifecycle] that incorporates information security and privacy considerations
      Define and document information security and privacy roles and responsibilities throughout the system development lifecycle
      Identify individuals having information security and privacy roles and responsibilities
      Integrate the organizational information security and privacy risk management process into system development lifecycle activities
    discussion: |-
      A system development lifecycle process provides the foundation for the successful development, implementation, and operation of organizational systems. The integration of security and privacy considerations early in the system development lifecycle is a foundational principle of systems security engineering and privacy engineering. Applying the required controls within the system development lifecycle requires a basic understanding of information security and privacy, threats, vulnerabilities, adverse impacts, and risk to critical mission and business functions.
      The security engineering principles in SA-08 help individuals properly design, code, and test systems and system components. Organizations include qualified personnel (e.g., senior officials in the department’s security governance, appropriate privacy senior officials or executives, security and privacy architects, and security and privacy engineers) in system development lifecycle processes to ensure that established security and privacy requirements are incorporated into organizational systems. Role-based security and privacy training programs can ensure that individuals with key security and privacy roles and responsibilities have the experience, skills, and expertise to conduct assigned system development lifecycle activities.
      The effective integration of security and privacy requirements into enterprise architecture also helps ensure that important security and privacy considerations are addressed throughout the system lifecycle and that those considerations are directly related to organizational mission and business processes. This process also facilitates the integration of the information security and privacy architectures into the enterprise architecture, consistent with the risk management strategy of the organization. Because the system development lifecycle involves multiple organizations (e.g., external suppliers, developers, integrators, service providers), acquisition and supply chain risk management functions and controls play significant roles in the effective management of the system during the lifecycle.
