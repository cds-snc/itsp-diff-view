  - canonicalId: "SC-30"
    displayId: "SC-30"
    sourceId: "SC-30"
    family: "SC"
    type: "control"
    title: "Concealment and misdirection"
    text: |-
      Employ the following concealment and misdirection techniques for [Assignment: organization-defined systems] at [Assignment: organization-defined time periods] to confuse and mislead adversaries: [Assignment: organization-defined concealment and misdirection techniques].
    discussion: |-
      Concealment and misdirection techniques can significantly reduce the targeting capabilities of adversaries (i.e., the window of opportunity and available attack surface) to initiate and complete attacks. For example, virtualization techniques provide organizations with the ability to disguise systems, potentially reducing the likelihood of successful attacks without the cost of having multiple platforms.
      The increased use of concealment and misdirection techniques and methods — including randomness, uncertainty, and virtualization — may sufficiently confuse and mislead adversaries and subsequently increase the risk of discovery and/or exposing tradecraft. Concealment and misdirection techniques may provide additional time to perform core mission and business functions. The implementation of concealment and misdirection techniques may add to the complexity and management overhead required for the system.
