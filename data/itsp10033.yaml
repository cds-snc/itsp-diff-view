    sourceId: "SA-04 (03)"
    family: "SA"
    type: "enhancement"
    title: "Acquisition process: Development methods, techniques, and practices"
    text: |-
      Require the developer of the system, system component, or system service to demonstrate the use of a system development lifecycle process that includes:
      [Assignment: organization-defined systems engineering methods]
      [Selection (1 or more): [Assignment: organization-defined systems security engineering methods]; [Assignment: organization-defined privacy engineering methods]]
      [Assignment: organization-defined software development methods; testing, evaluation, assessment, verification, and validation methods; and quality control processes]
      Discussion: Following a system development lifecycle that includes state-of-the-practice software development methods, systems engineering methods, systems security and privacy engineering methods, and quality control processes helps to reduce the number and severity of latent errors within systems, system components, and system services. Reducing the number and severity of such errors reduces the number of vulnerabilities in those systems, components, and services.
      Transparency in the methods and techniques that developers select and implement for systems engineering, systems security and privacy engineering, software development, component and system assessments, and quality control processes provides an increased level of assurance in the security functionality of the system, system component, or system service being acquired.
      Related controls and activities: None.
