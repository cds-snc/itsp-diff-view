    family: "SC"
    type: "control"
    title: "Secure name/address resolution service (recursive or caching resolver)"
    text: |-
      Request and perform data origin authentication and data integrity verification on the name/address resolution responses the system receives from authoritative sources.
    discussion: |-
      Each client of name resolution services either performs this validation on its own or has authenticated channels to trusted validation providers. Systems that provide name and address resolution services for local clients include recursive resolving or caching DNS servers. DNS client resolvers either perform validation of DNSSEC signatures, or clients use authenticated channels to recursive resolvers that perform such validations. Systems that use technologies other than the DNS to map between host and service names and network addresses provide some other means to enable clients to verify the authenticity and integrity of response data.
