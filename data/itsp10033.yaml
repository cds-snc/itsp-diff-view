  - canonicalId: "SA-08.16"
    displayId: "SA-08 (16)"
    sourceId: "SA-08 (16)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Self-reliant trustworthiness"
    text: |-
      Implement the security design principle of self-reliant trustworthiness in [Assignment: organization-defined systems or system components].
      Discussion: The principle of self-reliant trustworthiness states that systems minimize their reliance on other systems for their own trustworthiness. A system is trustworthy by default, and any connection to an external entity is used to supplement its function. If a system were required to maintain a connection with another external entity in order to maintain its trustworthiness, then that system would be vulnerable to malicious and non-malicious threats that could result in the loss or degradation of that connection.
      The benefit of the principle of self-reliant trustworthiness is that the isolation of a system will make it less vulnerable to attack. A corollary to this principle relates to the ability of the system (or system component) to operate in isolation and then resynchronize with other components when it is rejoined with them.
      Related controls and activities: None.
