    title: "Particularly sensitive personal information: Social insurance numbers"
    text: |-
      When a program or activity collects, uses, or discloses social insurance numbers (SINs):
      ensure there is express authority for the collection and use of the SIN 
      provide notice, at the point of collection, regarding the authority to collect as well as the anticipated use or disclosures of the SIN 
      ensure the collection and use of SIN is included in the associated PIB , if appropriate
      Discussion: None.
      GC discussion: GC policy establishes specific requirements for organizations’ handling of some categories of particularly sensitive personal information such as SIN s. The SIN is a confidential number that should not be used as identification or provided for non-governmental purposes. Organizations should take steps to eliminate unnecessary uses of SIN s and other sensitive information and should observe any particular requirements that apply.
      The collection and use of the SIN by government institutions should only be for the authorized and lawful purposes outlined in Appendix A of the TBS Directive on Social Insurance Number. The directive provides direction to government institutions on how the SIN can be collected, used, and disclosed. It also outlines the methods to establish policy authority for a new collection or new consistent use of the SIN .
      Related controls and activities: IA-04.
