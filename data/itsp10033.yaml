    text: |-
      Limit the number of external network connections to the system.
      Discussion: Limiting the number of external network connections facilitates monitoring of inbound and outbound communications traffic. Limiting the number of external network connections to the system is important during transition periods from older to newer technologies (e.g., transitioning from IPv4 to IPv6 network protocols). Such transitions may require implementing the older and newer technologies simultaneously during the transition period and thus increase the number of access points to the system.
