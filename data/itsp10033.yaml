    title: "Cross-domain policy enforcement"
    text: |-
      Implement a policy enforcement mechanism [Selection (1): physically; logically] between the physical and/or network interfaces for the connecting security domains.
    discussion: |-
      For logical policy enforcement mechanisms, organizations should avoid creating a logical path between interfaces to prevent the ability to bypass the policy enforcement mechanism. For physical policy enforcement mechanisms, the robustness of physical isolation afforded by the physical implementation of policy enforcement may be needed to preclude the presence of logical covert channels penetrating the security domain.
