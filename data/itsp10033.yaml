  - canonicalId: "CM-13"
    displayId: "CM-13"
    sourceId: "CM-13"
    family: "CM"
    type: "control"
    title: "Data action mapping"
    text: "Develop and document a map of system data actions."
    discussion: |-
      Data actions are system operations, and some data actions involve personal information. The handling of such information encompasses the full information lifecycle, which includes collection, creation, transformation, use, disclosure, retention, and disposition.
      A map of system data actions includes discrete data actions, identifying which elements of personal information are in use for the data actions, system components involved in the data actions, information custodians, and the owners or operators of the system components. Understanding what personal information is being handled (e.g., the sensitivity of the personal information), how personal information is being handled (e.g., if the data action is visible to the individual or is handled in another part of the system), and by whom provides a number of contextual factors that are important to assessing the degree of privacy risk associated with the system.
      Data maps can be illustrated in different ways, and the level of detail may vary based on the mission and business needs of the organization. The data map may be an overlay of any system design artifact that the organization is using. The development of this map may necessitate coordination between the privacy and security programs regarding the covered data actions and the components that are identified as part of the system. Users whose activities are mapped should be given notice of the activity.
