    title: "System backup: Dual authorization for deletion or destruction"
    text: |-
      Enforce dual authorization for the deletion or destruction of [Assignment: organization-defined backup information].
      Discussion: Dual authorization ensures that deletion or destruction of backup information cannot occur unless 2 qualified individuals carry out the task. Individuals deleting or destroying backup information possess the skills or expertise to determine if the proposed deletion or destruction of information reflects organizational policies and procedures. Dual authorization may also be known as two-person control. To reduce the risk of collusion, organizations consider rotating dual authorization duties to other individuals.
      Related controls and activities: AC-03, AC-05, MP-02.
