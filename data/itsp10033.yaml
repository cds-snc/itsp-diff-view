    title: "Developer configuration management: Mapping integrity for version control"
    text: |-
      Require the developer of the system, system component, or system service to maintain the integrity of the mapping between the master build data describing the current version of security-relevant hardware, software, and firmware and the onsite master copy of the data for the current version.
      Discussion: Mapping integrity for version control addresses changes to hardware, software, and firmware components during initial development and system development lifecycle updates. Maintaining the integrity between the master copies of security-relevant hardware, software, and firmware (including designs, hardware drawings, and source code) and the equivalent data in master copies in operational environments is essential to ensuring the availability of organizational systems that support critical mission and business functions.
