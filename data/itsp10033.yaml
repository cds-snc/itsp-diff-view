    title: "Boundary protection: Restrict incoming communications traffic"
    text: |-
      Only allow incoming communications from [Assignment: organization-defined authorized sources] to be routed to [Assignment: organization-defined authorized destinations].
      Discussion: General source-address validation techniques are applied to restrict the use of illegal and unallocated source addresses as well as source addresses that should only be used within the system. The restriction of incoming communications traffic provides determinations that source and destination address pairs represent authorized or allowed communications. Determinations can be based on several factors, including the presence of such address pairs in the lists of authorized or allowed communications, the absence of such address pairs in lists of unauthorized or disallowed pairs, or meeting more general rules for authorized or allowed source and destination pairs.
      Strong authentication of network addresses is not possible without the use of explicit security protocols and, thus, addresses can often be spoofed. Furthermore, identity-based incoming traffic restriction methods can be employed, including router access control lists and firewall rules.
      Related controls and activities: AC-03.
