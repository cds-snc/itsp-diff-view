    displayId: "PM-03"
    sourceId: "PM-03"
    family: "PM"
    type: "control"
    title: "Information security and privacy resources"
    text: |-
      Include the resources needed to implement the information security and privacy programs in capital planning and investment requests and document all exceptions to this requirement
      Prepare documentation required for addressing information security and privacy programs in capital planning and investment requests in accordance with applicable laws, Orders in Council, directives, policies, regulations, standards
      Make the planned information security and privacy resources available for expenditure
    discussion: |-
      Organizations consider establishing champions for information security and privacy and, as part of including the necessary resources, assign specialized expertise and resources as needed. Organizations may designate and empower a group to manage and provide oversight for the information security and privacy aspects of the capital planning and investment control process.
