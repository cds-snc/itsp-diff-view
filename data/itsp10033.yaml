    sourceId: "IA-13 (02)"
    family: "IA"
    type: "enhancement"
    title: |-
      Identity providers and authorization servers: Verification of identity assertions and access tokens
    text: |-
      The source and integrity of identity assertions and access tokens are verified before granting access to system and information resources.
      Discussion: This includes verification of digital signatures protecting identity assertions and access tokens, as well as included metadata. Metadata includes information about the access request such as information unique to the user, system, or information resource being accessed, or the transaction itself such as time. Protected system and information resources could include connected networks, applications, and API s.
