    title: "Specialization"
    text: |-
      Employ [Selection (1 or more): design; modification; augmentation; reconfiguration] on [Assignment: organization-defined systems or system components] supporting mission-essential services or functions to increase the robustness in those systems or components.
    discussion: |-
      It is often necessary to enhance a system or system component that supports mission-essential services or functions to maximize the robustness of the resource. Sometimes this enhancement is done at the design level. In other instances, it is done post-design, either by modifying the system in question or by augmenting the system with additional components. For example, supplemental authentication or non-repudiation functions may be added to the system to enhance the identity of critical resources to other resources that depend on the organization-defined resources.
