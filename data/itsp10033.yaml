    type: "enhancement"
    title: "Transmission of security and privacy attributes: Anti-spoofing mechanisms"
    text: |-
      Implement anti-spoofing mechanisms to prevent adversaries from falsifying the security attributes indicating the successful application of the security process.
      Discussion: Some attack vectors operate by altering the security attributes of an information system to intentionally and maliciously implement an insufficient level of security within the system. The alteration of attributes leads organizations to believe that a greater number of security functions are in place and operational than were actually implemented.
      Related controls and activities: SI-03, SI-04, SI-07.
