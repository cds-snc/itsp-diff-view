    title: "Configuration management plan"
    text: |-
      Develop, document, and implement a configuration management plan for the system that
      addresses roles, responsibilities, and configuration management processes and procedures
      establishes a process for identifying configuration items throughout the system development lifecycle and for managing the configuration of the configuration items
      defines the configuration items for the system and places the configuration items under configuration management
      is reviewed and approved by [Assignment: organization-defined personnel or roles]
      protects the configuration management plan from unauthorized disclosure and modification
    discussion: |-
      Configuration management activities occur throughout the system development lifecycle. As such, there are developmental configuration management activities (e.g., the control of code and software libraries) and operational configuration management activities (e.g., control of installed components and how the components are configured). Configuration management plans satisfy the requirements in configuration management policies while being tailored to individual systems. Configuration management plans define processes and procedures for how configuration management is used to support system development lifecycle activities.
      Configuration management plans are generated during the development and acquisition stage of the system development lifecycle. The plans describe how to advance changes through change management processes; update configuration settings and baselines; maintain component inventories; control development, test, and operational environments; and develop, release, and update key documents.
      Organizations can employ templates to help ensure the consistent and timely development and implementation of configuration management plans. Templates can represent a configuration management plan for the organization with subsets of the plan implemented on a system-by-system basis.
      Configuration management approval processes include the designation of key stakeholders responsible for reviewing and approving proposed changes to systems, and personnel who conduct security and privacy impact analyses prior to the implementation of changes to the systems. Configuration items are the system components, such as the hardware, software, firmware, and documentation to be configuration managed. As systems continue through the system development lifecycle, new configuration items may be identified, and some existing configuration items may no longer need to be under configuration control.
