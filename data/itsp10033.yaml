  - canonicalId: "SA-24"
    displayId: "SA-24"
    sourceId: "SA-24"
    family: "SA"
    type: "control"
    title: "Design for cyber resiliency"
    text: |-
      Design organizational systems, system components, or system services to achieve cyber resiliency by:
      defining the following cyber resiliency goals: [Assignment: organization-defined cyber resiliency goals]
      defining the following cyber resiliency objectives: [Assignment: organization-defined cyber resiliency objectives]
      defining the following cyber resiliency techniques: [Assignment: organization-defined cyber resiliency techniques]
      defining the following cyber resiliency implementation approaches: [Assignment: organization-defined cyber resiliency implementation approaches]
      defining the following cyber resiliency design principles: [Assignment: organization-defined cyber resiliency design principles]
      Implement and review the selected cyber resiliency goals, objectives, techniques, implementation approaches, and design principles as part of an organizational risk management process or systems security engineering process
    discussion: |-
      Cyber resiliency is critical to ensuring the survivability of mission-critical systems and high value assets. Cyber resiliency focuses on limiting the damage from adversity or the conditions that can cause a loss of assets. Damage can affect (1) organizations (for example, loss of reputation, increased existential risk), (2) mission or business functions (for example, decreased capability to complete current missions and to accomplish future missions), (3) security (for example, decreased capability to achieve security objectives or to prevent, detect, and respond to cyber incidents), (4) systems (for example, unauthorized use of system resources or decreased capability to meet system requirements), or (5) specific system elements (for example, physical destruction; corruption, modification, or fabrication of information).
      Cyber resiliency goals are intended to help organizations maintain a state of informed preparedness for adversity, continue essential mission or business functions despite adversity, restore mission or business functions during and after adversity, and modify mission or business functions and their supporting capabilities in response to predicted changes in technical, operational, or threat environments.
      NIST SP 800-160 Volume 2 Revision 1 provides additional information on the Cyber Resiliency Engineering Framework, including detailed descriptions of cyber resiliency goals, objectives, techniques, implementation approaches, and design principles. NIST SP 800-160 Volume 1 Revision 1 provides additional information on achieving cyber resiliency as an emergent property of an engineered system.
