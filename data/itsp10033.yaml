  - canonicalId: "SC-03.03"
    displayId: "SC-03 (03)"
    sourceId: "SC-03 (03)"
    family: "SC"
    type: "enhancement"
    title: "Security function isolation: Minimize non-security functionality"
    text: |-
      Minimize the number of non-security functions included within the isolation boundary containing security functions.
      Discussion: Where it is not feasible to achieve strict isolation of non-security functions from security functions, it is necessary to take actions to minimize non-security-relevant functions within the security function boundary. Non-security functions contained within the isolation boundary are considered security-relevant because errors or malicious code in the software can directly impact the security functions of systems. The fundamental design objective is that the specific portions of systems that provide information security are of minimal size and complexity. Minimizing the number of non-security functions in the security-relevant system components allows designers and implementers to focus only on those functions which are necessary to provide the desired security capability (typically access enforcement). By minimizing the non-security functions within the isolation boundaries, the amount of code that is trusted to enforce security policies is significantly reduced, thus contributing to understandability.
      Related controls and activities: None.
