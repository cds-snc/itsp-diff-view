    sourceId: "SA-08 (30)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Procedural rigour"
    text: |-
      Implement the security design principle of procedural rigour in [Assignment: organization-defined systems or system components].
      Discussion: The principle of procedural rigour states that the rigour of a system lifecycle process is commensurate with its intended trustworthiness and robustness. Procedural rigour defines the scope, depth, and detail of the system lifecycle procedures. Rigorous system lifecycle procedures contribute to the assurance that the system is correct and free of unintended functionality in several ways. First, the procedures impose checks and balances on the lifecycle process such that the introduction of unspecified functionality is prevented.
      Second, rigorous procedures applied to systems security engineering activities that produce specifications and other system design documents contribute to the ability to understand the system as it has been built rather than trusting that the component, as implemented, is the authoritative (and potentially misleading) specification.
      Finally, it is easier to make modifications to an existing system component when there are detailed specifications that describe its current design than it is to study source code or schematics to try to understand how the component works.
      Procedural rigour helps ensure that security functional and assurance requirements have been satisfied, and it contributes to a better-informed basis for determining trustworthiness and robustness. Procedural rigour is commensurate with the degree of assurance desired for the system. If the required assurance of the system is low, a high level of procedural rigour may add unnecessary cost, whereas when high assurance is critical, the cost of high procedural rigour is merited.
      Related controls and activities: None.
