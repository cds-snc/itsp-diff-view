  - canonicalId: "AC-02.12"
    displayId: "AC-02 (12)"
    sourceId: "AC-02 (12)"
    family: "AC"
    type: "enhancement"
    title: "Account management: Account monitoring for atypical usage"
    text: |-
      Monitor system accounts for [Assignment: organization-defined atypical usage]
      Report atypical usage of system accounts to [Assignment: organization-defined personnel or roles]
      Discussion: Atypical usage includes accessing systems at certain times of the day or from locations that are not consistent with the normal usage patterns of individuals. Monitoring for atypical usage may reveal rogue behaviour by individuals or an attack in progress. Account monitoring may inadvertently create privacy risks since data collected to identify atypical usage may reveal previously unknown information about the behaviour of individuals. Organizations assess and document privacy risks from monitoring accounts for atypical usage in their privacy impact assessment (PIA) and make determinations that are in alignment with their privacy program plan.
      Related controls and activities: AU-06, AU-07, CA-07, IR-08, SI-04.
    discussion: |-
      Atypical usage includes accessing systems at certain times of the day or from locations that are not consistent with the normal usage patterns of individuals. Monitoring for atypical usage may reveal rogue behaviour by individuals or an attack in progress. Account monitoring may inadvertently create privacy risks since data collected to identify atypical usage may reveal previously unknown information about the behaviour of individuals. Organizations assess and document privacy risks from monitoring accounts for atypical usage in their privacy impact assessment (PIA) and make determinations that are in alignment with their privacy program plan.
