  - canonicalId: "SC-44"
    displayId: "SC-44"
    sourceId: "SC-44"
    family: "SC"
    type: "control"
    title: "Detonation chambers"
    text: |-
      Employ a detonation chamber capability within [Assignment: organization-defined system, system component, or location].
    discussion: |-
      Detonation chambers, also known as dynamic execution environments, allow organizations to open email attachments, execute untrusted or suspicious applications, and execute URL requests in the safety of an isolated environment or a virtualized sandbox. Protected and isolated execution environments provide a means of determining whether the associated attachments or applications contain malicious code.
      While detonation chambers are related to the concept of deception nets, they are not intended to maintain a long-term environment in which adversaries can operate and their actions can be observed. Rather, detonation chambers are intended to quickly identify malicious code and either reduce the likelihood that the code is propagated to user environments of operation or prevent such propagation completely.
