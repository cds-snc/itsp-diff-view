  - canonicalId: "SA-08.02"
    displayId: "SA-08 (02)"
    sourceId: "SA-08 (02)"
    family: "SA"
    type: "enhancement"
    title: "Security and privacy engineering principles: Least common mechanism"
    text: |-
      Implement the security design principle of least common mechanism in [Assignment: organization-defined systems or system components].
      Discussion: The principle of least common mechanism states that the amount of mechanism common to more than one user and depended on by all users is minimized (Popek, 1974). Mechanism minimization implies that different components of a system refrain from using the same mechanism to access a system resource.
      Every shared mechanism (especially a mechanism involving shared variables) represents a potential information path between users and is designed with care to ensure that it does not unintentionally compromise security (Saltzer and Schroeder, 1975). Implementing the principle of least common mechanism helps to reduce the adverse consequences of sharing the system state among different programs.
      A single program that corrupts a shared state (including shared variables) has the potential to corrupt other programs that are dependent on the state. The principle of least common mechanism also supports the principle of simplicity of design and addresses the issue of covert storage channels (Lampson, 1973).
      Related controls and activities: None.
    discussion: |-
      The principle of least common mechanism states that the amount of mechanism common to more than one user and depended on by all users is minimized (Popek, 1974). Mechanism minimization implies that different components of a system refrain from using the same mechanism to access a system resource.
